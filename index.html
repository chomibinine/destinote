<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명노트(destinote) | Pro 100% Standalone</title>
    <!-- 핵심 라이브러리 동기식 로드 (안정성 최우선) -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #05070a; --bg-gradient: radial-gradient(circle at 50% 0%, #111724 0%, #05070a 100%); --card-glass: rgba(18, 22, 33, 0.6); --card-border: rgba(255, 255, 255, 0.08); --accent-gold: #d4af37; --accent-gold-light: #f9e596; --premium-gradient: linear-gradient(135deg, #f9e596 0%, #d4af37 100%); --text-main: #e2e8f0; --text-muted: #94a3b8; --color-wood: #4ade80; --color-fire: #fb923c; --color-earth: #fbbf24; --color-metal: #cbd5e1; --color-water: #60a5fa; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; word-break: keep-all; overflow-wrap: break-word; }
        body { background: var(--bg-base); color: var(--text-main); line-height: 1.8; overflow-x: hidden; min-height: 100vh; position: relative; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background: var(--bg-gradient); }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3; animation: float 20s infinite alternate ease-in-out; }
        .orb-1 { width: 450px; height: 450px; background: rgba(212,175,55,0.15); top: -100px; left: -150px; }
        .orb-2 { width: 550px; height: 550px; background: rgba(56,189,248,0.1); bottom: -200px; right: -150px; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,50px) scale(1.1); } }
        
        .app-container { max-width: 720px; margin: 0 auto; padding: 0 20px 160px; position: relative; z-index: 1; }
        .header { text-align: center; padding: 80px 0 40px; }
        .header h1 { color: #fff; font-size: 2.6rem; font-weight: 800; letter-spacing: 4px; background: var(--premium-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
        .card { background: var(--card-glass); backdrop-filter: blur(25px); border: 1px solid var(--card-border); border-radius: 35px; padding: 40px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--accent-gold-light); font-size: 0.85rem; letter-spacing: 1px; }
        input, select { width: 100%; padding: 18px 22px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .select-row { display: flex; gap: 12px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 60px; }
        .menu-item { background: var(--card-glass); border: 1px solid var(--card-border); border-radius: 28px; padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.4s; }
        .menu-item:hover { border-color: var(--accent-gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .menu-icon-wrap { width: 65px; height: 65px; margin: 0 auto 20px; background: rgba(255,255,255,0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 1px solid var(--card-border); }
        
        .sec-title { font-size: 1.4rem; color: var(--accent-gold-light); font-weight: 800; margin: 80px 0 30px; display: flex; align-items: center; gap: 12px; }
        .sec-title::before { content: '✦'; color: var(--accent-gold); }
        .detail-text { font-size: 1.05rem; line-height: 1.9; color: var(--text-main); text-align: justify; } 
        .detail-text b.basis-text { color: var(--accent-gold-light); font-weight: 700; display: inline-block; margin-bottom: 6px; font-size: 1.1rem;}
        
        .pillar-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; } 
        .pillar { background: rgba(255,255,255,0.03); padding: 25px 8px; border-radius: 20px; text-align: center; border: 1px solid var(--card-border); position: relative;} 
        .pillar b { font-size: 1.6rem; display: block; color: #fff; margin-bottom: 5px; transition: 0.3s;}
        .pillar span { font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 10px; font-weight:600; }
        .pillar .broken { color: #ff4757 !important; text-decoration: line-through; opacity: 0.6; }
        .pillar .amplified { color: #4ade80 !important; text-shadow: 0 0 10px rgba(74,222,128,0.5); }
        
        .daewun-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; text-align: center; margin-bottom: 50px;}
        .daewun-col { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 0; }
        .daewun-age { font-size: 0.75rem; color: var(--accent-gold-light); font-weight: 700; margin-bottom: 6px; }
        .daewun-char { font-size: 1.15rem; color: #fff; font-weight: 700; line-height: 1.3; }

        .element-chart-container { margin: 50px 0; padding: 35px; background: rgba(0,0,0,0.4); border-radius: 30px; border: 1px solid var(--card-border); }
        .bar-wrap { display: flex; align-items: center; margin-bottom: 18px; gap: 15px; }
        .bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 10px; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fill-wood { background: var(--color-wood); box-shadow: 0 0 12px rgba(74, 222, 128, 0.6); } 
        .fill-fire { background: var(--color-fire); box-shadow: 0 0 12px rgba(251, 146, 60, 0.6); } 
        .fill-earth { background: var(--color-earth); box-shadow: 0 0 12px rgba(251, 191, 36, 0.6); } 
        .fill-metal { background: var(--color-metal); box-shadow: 0 0 12px rgba(203, 213, 225, 0.6); } 
        .fill-water { background: var(--color-water); box-shadow: 0 0 12px rgba(96, 165, 250, 0.6); }

        .terminal-box { background: #0a0c10; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; font-family: 'Courier New', Courier, monospace; color: #10b981; font-size: 0.9rem; line-height: 1.6; margin-bottom: 50px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); overflow-x: hidden; word-break: break-all; }
        .log-sys { color: #60a5fa; } .log-err { color: #f87171; } .log-warn { color: #fbbf24; } .log-success { color: #a78bfa; font-weight: bold; } .log-info { color: #10b981; }

        .timeline { position: relative; padding-left: 20px; border-left: 2px solid rgba(212,175,55,0.2); margin-top:30px; } 
        .timeline-item { position: relative; margin-bottom: 35px; padding-left: 25px; } 
        .timeline-point { position: absolute; left: -31px; top: 8px; width: 12px; height: 12px; background: var(--accent-gold); border-radius: 50%; box-shadow: 0 0 10px var(--accent-gold); } 
        .timeline-year { font-size: 1.2rem; color: var(--accent-gold-light); font-weight: 800; margin-bottom: 8px; } 

        .btn-rec { display: inline-flex; align-items: center; justify-content: center; gap: 12px; background: rgba(255,255,255,0.04); color: #fff; padding: 20px; border-radius: 18px; text-decoration: none; font-weight: 600; border: 1px solid var(--card-border); width: 100%; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-rec:hover { background: rgba(255,255,255,0.1); }
        .btn-coupang { background: linear-gradient(135deg, #FF0000 0%, #FF5A00 100%); color: #fff !important; border: none; box-shadow: 0 10px 25px rgba(255,0,0,0.3); font-size: 1.1rem; }

        #loader { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-base); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; } 
        .loader-ring { width: 70px; height: 70px; border: 3px solid transparent; border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite; } 
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #custom-modal { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 71, 87, 0.95); color: #fff; padding: 15px 30px; border-radius: 12px; z-index: 100001; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; width: 90%; max-width: 400px; }
        
        .fade-in-section { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .fade-in-section.is-visible { opacity: 1; transform: none; }
        @media (max-width: 600px) { .pillar-row { grid-template-columns: repeat(2, 1fr); } .daewun-grid { grid-template-columns: repeat(4, 1fr); } .select-row { flex-wrap: wrap; } }
    </style>
</head>
<body>
<div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div id="loader"><div class="loader-ring"></div><p id="loader-text" style="color:var(--accent-gold); margin-top:25px; font-weight:700; letter-spacing:2px;">엔진 시스템 초기화 중...</p></div>
<div id="custom-modal"></div>

<div class="app-container" id="main-app" style="display:none;">
    <div id="home-view">
        <header class="header"><h1>운명노트</h1><p>소름돋는 정통 명리·궁합 (100% 무료)</p></header>
        
        <!-- 사주 입력 폼 -->
        <div id="input-area-standard" class="card">
            <div class="form-group"><label>성함</label><input type="text" id="user-name" placeholder="이름 입력 (특수문자 제외)"></div>
            <div class="form-group"><label>생년월일</label><div class="select-row"><select id="user-year"></select><select id="user-month"></select><select id="user-day"></select></div></div>
            <div class="form-group select-row">
                <div style="flex:1;"><label>성별</label><select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select></div>
                <div style="flex:1;"><label>력</label><select id="user-cal"><option value="solar">양력</option><option value="lunar">음력</option></select></div>
            </div>
            <div class="form-group" style="margin-top:20px;">
                <label>태어난 시각 <span style="font-size:0.75rem; font-weight:400; color:var(--text-muted);">(동경 135도 정밀 보정)</span></label>
                <select id="user-time">
                    <option value="none">모름 / 미정 (시주 생략)</option>
                    <option value="yaja">야자시 (23:30 ~ 23:59)</option>
                    <option value="joja">조자시 (00:00 ~ 01:29)</option>
                    <option value="2">축시 (01:30~)</option><option value="4">인시 (03:30~)</option><option value="6">묘시 (05:30~)</option>
                    <option value="8">진시 (07:30~)</option><option value="10">사시 (09:30~)</option><option value="12">오시 (11:30~)</option>
                    <option value="14">미시 (13:30~)</option><option value="16">신시 (15:30~)</option><option value="18">유시 (17:30~)</option>
                    <option value="20">술시 (19:30~)</option><option value="22">해시 (21:30~)</option>
                </select>
            </div>
        </div>

        <!-- 궁합 입력 폼 (토글) -->
        <div id="partner-input-area" class="card" style="display:none; border-top: 2px solid var(--accent-gold); margin-top: -20px;">
            <h4 style="color:var(--accent-gold-light); margin-bottom:20px; text-align:center;">❤️ 상대방 정보 입력</h4>
            <div class="form-group"><label>상대 이름</label><input type="text" id="partner-name" placeholder="상대방 이름"></div>
            <div class="form-group"><label>상대 생일</label><div class="select-row"><select id="p-year"></select><select id="p-month"></select><select id="p-day"></select></div></div>
            <div class="form-group select-row">
                <div style="flex:1;"><label>성별</label><select id="p-gender"><option value="female">여성</option><option value="male">남성</option></select></div>
                <div style="flex:1;"><label>력</label><select id="p-cal"><option value="solar">양력</option><option value="lunar">음력</option></select></div>
            </div>
            <div class="form-group" style="margin-top:20px;"><label>태어난 시각</label>
                <select id="p-time">
                    <option value="none">모름 / 미정 (시주 생략)</option>
                    <option value="yaja">야자시 (23:30~)</option><option value="joja">조자시 (~01:29)</option>
                    <option value="2">축시 (01:30~)</option><option value="4">인시 (03:30~)</option><option value="6">묘시 (05:30~)</option>
                    <option value="8">진시 (07:30~)</option><option value="10">사시 (09:30~)</option><option value="12">오시 (11:30~)</option>
                    <option value="14">미시 (13:30~)</option><option value="16">신시 (15:30~)</option><option value="18">유시 (17:30~)</option>
                    <option value="20">술시 (19:30~)</option><option value="22">해시 (21:30~)</option>
                </select>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="App.start('saju')"><div class="menu-icon-wrap">🧭</div><h3>정밀 사주 분석</h3><p>월령/파이프라인 통변</p></div>
            <div class="menu-item" onclick="App.toggleGunghap()"><div class="menu-icon-wrap" id="gun-icon">❤️</div><h3 id="gun-title">인연 궁합</h3><p>초정밀 용/희신 교차 분석</p></div>
            <div class="menu-item" onclick="App.start('tojeong')"><div class="menu-icon-wrap">📜</div><h3>토정비결</h3><p>2026 신년 상세운세</p></div>
            <div class="menu-item" onclick="Utils.showModal('타로 기능은 서버 최적화 중입니다. 정밀 사주를 이용해주세요.')"><div class="menu-icon-wrap">🃏</div><h3>타로 리딩</h3><p>무의식 3카드 리딩</p></div>
        </div>
        <div id="visitor-ui" style="text-align:center; font-size:0.8rem; color:var(--text-muted);"></div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-view" style="display:none;">
        <div id="report-wrap" class="report-wrapper"><div id="report-content"></div></div>
        <div style="display:flex; gap:10px; margin-top:30px;">
            <button class="btn-rec" style="flex:1; background:var(--bg-base);" onclick="App.downloadImage()">📸 리포트 캡처</button>
            <button class="btn-rec" style="flex:1; background:var(--bg-base);" onclick="App.shareReport()">🔗 링크 공유</button>
        </div>
        <button class="btn-rec" onclick="App.goHome()" style="background:var(--bg-base); margin-top:15px; margin-bottom:50px;">🏠 처음으로 돌아가기</button>
    </div>
</div>

<script>
    // ==========================================
    // 📁 1. Config & Data Layer (인라인, 100% 무료 스탠드얼론)
    // ==========================================
    const MYSTIC_CONFIG = {
        baseWeights: [1.2, 2.0, 1.2, 3.5, 1.5, 2.0, 1.2, 1.0], 
        clashPenalty: 0.6, 
        touganMul: { primary: 1.5, middle: 1.2, initial: 1.1 },
        jongThreshold: 0.20, 
        opThreshold: 0.70  
    };

    const RULES = {
        SAMHAP: { FIRE: ['寅', '午', '戌'], WATER: ['申', '子', '辰'], WOOD: ['亥', '卯', '未'], METAL: ['巳', '酉', '丑'] },
        SEASON_APPROVAL: { FIRE: ['巳','午','未','寅','戌'], WATER: ['亥','子','丑','申','辰'], WOOD: ['寅','卯','辰','亥','未'], METAL: ['申','酉','戌','巳','丑'] },
        CLASH: [['子','午'], ['丑','未'], ['寅','申'], ['卯','酉'], ['辰','戌'], ['巳','亥']],
        WONJIN: ['子未','丑午','寅酉','卯申','辰亥','巳戌','午丑','未子','申卯','酉寅','戌巳','亥辰'],
        GWIMUN: ['子酉','丑午','寅未','卯申','辰亥','巳戌','酉子','午丑','未寅','申卯','亥辰','戌巳'],
        BAEKHO: ['甲辰','乙未','丙戌','丁丑','戊辰','壬戌','癸丑'],
        SAMHYUNG: [['寅','巳','申'], ['丑','戌','未']]
    };

    const MYSTIC_DATA = {
      YONGSHIN_DB: {
        "木": { "n": "목(木)", "d": "얼어붙은 대지를 뚫고 하늘로 뻗어나가는 거침없는 생명력이 절실합니다. 새로운 도전을 당장 시작하십시오. 뻔뻔할 정도의 자신감을 장착할 때 운로가 열립니다." },
        "火": { "n": "화(火)", "d": "자신을 세상 밖으로 화려하게 드러내야만 살 수 있습니다. 무대 정중앙에 당당히 서서 열정을 발산하는 것만이 개운의 핵심입니다." },
        "土": { "n": "토(土)", "d": "거대한 태산처럼 묵직하게 삶의 중심을 잡고, 갈등을 품어내는 지혜로운 중재자가 되어야 안정을 쟁취합니다." },
        "金": { "n": "금(金)", "d": "당신의 에너지를 갉아먹는 나쁜 인연은 단칼에 베어내야 합니다. 서늘한 원칙을 굳건히 세우고 현실적인 결실에 집중해야 합니다." },
        "水": { "n": "수(水)", "d": "굳어있는 사고방식을 버리고 흐르는 물처럼 한없이 유연해져야 합니다. 세상의 거대한 흐름을 관망하는 깊은 여유를 가져야 합니다." }
      },
      SHIN_SAL_EXT: {
        "삼형살": { "n": "삼형살(三刑)", "d": "강한 에너지들이 깎아내는 형국으로, 직업적으로 쓰면 의료/법조계에서 최고의 권력을 쥡니다." },
        "귀문관살": { "n": "귀문관살(鬼門)", "d": "남들이 보지 못하는 이면을 꿰뚫는 직관력이 존재합니다. 기획과 창작분야에서 신의 경지에 오릅니다." },

      },
      WOUNSUNG_DB: {
        "장생": "아기의 맑은 기운으로, 윗사람의 보호와 지원을 받아 성장하는 에너지입니다.", "목욕": "유행에 민감하고 도화의 매력이 강력하나 감정 기복이 출렁일 수 있습니다.",

            if({'木':'土', '火':'金', '土':'水', '金':'木', '水':'火'}[me] === target) return '재성';
            if({'木':'金', '火':'水', '土':'木', '金':'火', '水':'土'}[me] === target) return '관성';
            if({'木':'水', '火':'木', '土':'火', '金':'土', '水':'金'}[me] === target) return '인성';
            return '-';
        }
    };

    const Pipeline = {
        run: (y, m, d, hStr, cal, isMale) => {
            let hr = 12, min = 0;
            if(hStr === 'yaja') { hr = 23; min = 30; } else if(hStr === 'joja') { hr = 0; min = 30; } else if(hStr !== 'none') { hr = parseInt(hStr); min = 0; }

            let sol, lun;
            if(cal === 'solar'){ sol = Solar.fromYmdHms(y,m,d,hr,min,0); lun = sol.getLunar(); } else { lun = Lunar.fromYmdHms(y,m,d,hr,min,0); sol = lun.getSolar(); }
            
            const bazi = lun.getEightChar();
            let ch = [bazi.getYearGan(), bazi.getYearZhi(), bazi.getMonthGan(), bazi.getMonthZhi(), bazi.getDayGan(), bazi.getDayZhi()];
            let stems = [ch[0], ch[2], ch[4]];
            let branches = [ch[1], ch[3], ch[5]];
            
            if (hStr !== 'none') {
                ch.push(bazi.getTimeGan(), bazi.getTimeZhi());
                stems.push(ch[6]);
                branches.push(ch[7]);
            }

            const dG = ch[4] || '甲', dZ = ch[5], mZ = ch[3], oh = CoreHelper.getOh(dG) || '木';
            
            let logs = [];
            let scores = {'木':0, '火':0, '土':0, '金':0, '水':0};

            logs.push({ level: 'sys', msg: `[Phase 1] 월령(${mZ}) 기준 가중치 파이프라인 스캔: ${ch.join('')}` });

            let branchStates = [
                { char: branches[0], weight: MYSTIC_CONFIG.baseWeights[1], clashCount: 0 },
                { char: branches[1], weight: MYSTIC_CONFIG.baseWeights[3], clashCount: 0 },
                { char: branches[2], weight: MYSTIC_CONFIG.baseWeights[5], clashCount: 0 }
            ];
            if (hStr !== 'none') branchStates.push({ char: branches[3], weight: MYSTIC_CONFIG.baseWeights[7], clashCount: 0 });

            // [Phase 2] 전면적 지지충 스캔
            const bLen = branchStates.length;
            for(let i=0; i<bLen; i++) {
                for(let j=i+1; j<bLen; j++) {
                    const b1 = branchStates[i], b2 = branchStates[j];
                    RULES.CLASH.forEach(cp => {
                        if((b1.char===cp[0] && b2.char===cp[1]) || (b1.char===cp[1] && b2.char===cp[0])) {
                            b1.clashCount++; b2.clashCount++;
                            b1.weight *= Math.pow(MYSTIC_CONFIG.clashPenalty, b1.clashCount); 
                            b2.weight *= Math.pow(MYSTIC_CONFIG.clashPenalty, b2.clashCount); 
                            logs.push({ level: 'err', msg: `[Phase 2] 지지충 감지 -> ${b1.char}${b2.char}충 발생. 지지 파워 삭감.` });
                        }
                    });
                }
            }

            // [Phase 3] 삼합
            let habScores = {'木':0, '火':0, '土':0, '金':0, '水':0};
            const activeB = branchStates.filter(b=>b.clashCount === 0).map(b=>b.char); 
            
            if(RULES.SAMHAP.FIRE.every(b => activeB.includes(b))) { 
                if(RULES.SEASON_APPROVAL.FIRE.includes(mZ)) { habScores['火'] += 4.0; logs.push({ level: 'success', msg: `[Phase 3] 寅午戌 화국 형성. 에너지 대폭발(+4.0).` }); }
                else { habScores['火'] += 1.5; logs.push({ level: 'warn', msg: `[Phase 3] 寅午戌 삼합이 있으나 월령 불허로 미약한 반합(+1.5).` }); }
            }
            if(RULES.SAMHAP.WATER.every(b => activeB.includes(b))) { 
                if(RULES.SEASON_APPROVAL.WATER.includes(mZ)) { habScores['水'] += 4.0; logs.push({ level: 'success', msg: `[Phase 3] 申子辰 수국 형성. 에너지 대폭발(+4.0).` }); }
                else { habScores['水'] += 1.5; logs.push({ level: 'warn', msg: `[Phase 3] 申子辰 반합(+1.5).` }); }
            }
            if(RULES.SAMHAP.WOOD.every(b => activeB.includes(b))) { 
                if(RULES.SEASON_APPROVAL.WOOD.includes(mZ)) { habScores['木'] += 4.0; logs.push({ level: 'success', msg: `[Phase 3] 亥卯未 목국 형성. 에너지 대폭발(+4.0).` }); }
                else { habScores['木'] += 1.5; logs.push({ level: 'warn', msg: `[Phase 3] 亥卯未 반합(+1.5).` }); }
            }
            if(RULES.SAMHAP.METAL.every(b => activeB.includes(b))) { 
                if(RULES.SEASON_APPROVAL.METAL.includes(mZ)) { habScores['金'] += 4.0; logs.push({ level: 'success', msg: `[Phase 3] 巳酉丑 금국 형성. 에너지 대폭발(+4.0).` }); }
                else { habScores['金'] += 1.5; logs.push({ level: 'warn', msg: `[Phase 3] 巳酉丑 반합(+1.5).` }); }
            }

            // [Phase 4] 점수 정산 및 투간 증폭
            let isTougan = false;
            ch.forEach((char, i) => {
                const el = CoreHelper.getOh(char);
                if(el) {
                    let w = MYSTIC_CONFIG.baseWeights[i];
                    if(i%2 !== 0 && branchStates[Math.floor(i/2)]) w = branchStates[Math.floor(i/2)].weight;
                    
                    let seasonMul = CoreHelper.getSeasonMultiplier(el, mZ);
                    
                    if(i % 2 === 0) {
                        let touganAmp = 1.0;
                        branchStates.forEach((b) => {
                            if (b.clashCount > 1) return; 
                            const jg = CoreHelper.jiJangGan[b.char];
                            if (jg) {
                                if (jg[jg.length - 1] === char) touganAmp = Math.max(touganAmp, MYSTIC_CONFIG.touganMul.primary);
                                else if (jg.includes(char)) touganAmp = Math.max(touganAmp, MYSTIC_CONFIG.touganMul.middle);
                            }
                        });
                        if(touganAmp > 1.0) { w *= touganAmp; if(i===4) isTougan = true; }
                    }
                    scores[el] += (w * seasonMul);
                }
            });
            Object.keys(habScores).forEach(k => scores[k] += habScores[k]);

            // [Phase 5] 종격 판별 및 조후/억부 용신 도출
            let rootScore = 0;
            branchStates.forEach((b) => {
                if (b.clashCount > 1) return;
                const jg = CoreHelper.jiJangGan[b.char];
                if(jg) { if (jg[jg.length - 1] === dG) rootScore += 3; else if (jg.includes(dG)) rootScore += 1; }
            });

            let isJong = false;
            const motherEl = {'木':'水', '火':'木', '土':'火', '金':'土', '水':'金'}[oh];
            const childEl = {'木':'火', '火':'土', '土':'金', '金':'水', '水':'木'}[oh];
            const wealthEl = {'木':'土', '火':'金', '土':'水', '金':'木', '水':'火'}[oh];
            const powerEl = {'木':'金', '火':'水', '土':'木', '金':'火', '水':'土'}[oh];

            const myTotalSc = scores[oh] + scores[motherEl];
            const totalEnergy = Object.values(scores).reduce((a,b)=>a+b, 0);
            if (totalEnergy === 0) throw new Error("에너지 계산 실패 (Total Energy 0)"); 
            const opMax = Math.max(scores[childEl], scores[wealthEl], scores[powerEl]);

            let yong = '', hee = '', gi = '', trueGyuk = '';

            if((myTotalSc / totalEnergy < MYSTIC_CONFIG.jongThreshold) && (opMax / totalEnergy > MYSTIC_CONFIG.opThreshold) && rootScore <= 2) { 
                isJong = true;
                if(opMax === scores[childEl]) { yong = childEl; hee = wealthEl; gi = motherEl; trueGyuk = '종아격'; }
                else if(opMax === scores[wealthEl]) { yong = wealthEl; hee = childEl; gi = oh; trueGyuk = '종재격'; }
                else { yong = powerEl; hee = wealthEl; gi = childEl; trueGyuk = '종살격'; }
                logs.push({ level: 'err', msg: `[Phase 5: CRITICAL] 일간 세력 미약 및 반대 세력 압도. 종격(從格: ${trueGyuk}) 판정. 운명이 180도 반전됩니다.` });
            } else {
                logs.push({ level: 'info', msg: `[Phase 5] 일간 세력 방어 성공. 정격 조후/억부 로직 진행.` });
                
                const hotEnergy = scores['火'] + scores['木'] * 0.5;
                const coldEnergy = scores['水'] + scores['金'] * 0.5;
                const isWinter = ['亥','子','丑'].includes(mZ);
                const isSummer = ['巳','午','未'].includes(mZ);

                if (isWinter && coldEnergy > hotEnergy * 2) { yong = '火'; hee = '木'; gi = '水'; } 
                else if (isSummer && hotEnergy > coldEnergy * 2) { yong = '水'; hee = '金'; gi = '火'; } 
                else {
                    if(myTotalSc > (totalEnergy - myTotalSc)) { yong = (scores[wealthEl] >= scores[powerEl]) ? wealthEl : powerEl; hee = childEl; gi = motherEl; } 
                    else { yong = motherEl; hee = oh; gi = powerEl; }
                }

                let jg = CoreHelper.jiJangGan[mZ] || []; let tg = null;
                for(let i=jg.length-1; i>=0; i--) { if(stems.includes(jg[i])) { tg = jg[i]; break; } }
                if(!tg) tg = jg[jg.length-1] || '甲';
                
                const gyukGod = CoreHelper.getGod(oh, CoreHelper.getOh(tg));
                if(gyukGod === '비겁') trueGyuk = '건록/양인격'; else trueGyuk = gyukGod + '격';
            }
            if(!yong) yong = '木'; 

            const sI = '甲乙丙丁戊己庚辛壬癸'.indexOf(dG), zI = '子丑寅卯辰巳午未申酉戌亥'.indexOf(dZ);
            const gm = sI!==-1 && zI!==-1 ? ['子丑寅卯辰巳午未申酉戌亥'.charAt((10-sI+zI)%12), '子丑寅卯辰巳午未申酉戌亥'.charAt((11-sI+zI)%12)] : [];
            const gmPos = []; 
            if(gm.includes(branches[0])) gmPos.push('년지'); 
            if(gm.includes(branches[1])) gmPos.push('월지'); 
            if(branches[2] && gm.includes(branches[2])) gmPos.push('일지');
            if(hStr!=='none' && branches[3] && gm.includes(branches[3])) gmPos.push('시지');

            const map = {'甲':['亥','子','丑','寅','卯','辰','巳','午','未','申','酉','戌'], '丙':['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'], '戊':['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'], '庚':['巳','午','未','申','酉','戌','亥','子','丑','寅','卯','辰'], '壬':['申','酉','戌','亥','子','丑','寅','卯','辰','巳','午','未'], '乙':['午','巳','辰','卯','寅','丑','子','亥','戌','酉','申','未'], '丁':['酉','申','未','午','巳','辰','卯','寅','丑','子','亥','戌'], '己':['酉','申','未','午','巳','辰','卯','寅','丑','子','亥','戌'], '辛':['子','亥','戌','酉','申','未','午','巳','辰','卯','寅','丑'], '癸':['卯','寅','丑','子','亥','戌','酉','申','未','午','巳','辰'] };
            const n12 = ['장생','목욕','관대','건록','제왕','쇠','병','사','묘','절','태','양'];

            let abyss = [];
            const pillars = [ch[0]+ch[1], ch[2]+ch[3], ch[4]+ch[5]];
            if(hStr !== 'none') pillars.push(ch[6]+ch[7]);

            if(pillars.some(p=>RULES.BAEKHO.includes(p))) abyss.push('백호대살');
            if(RULES.SAMHYUNG.some(set => set.every(z => branches.includes(z)))) abyss.push('삼형살');
            if(branches.some(z => RULES.WONJIN.includes(dZ+z) && dZ !== z)) abyss.push('원진살');
            if(branches.some(z => RULES.GWIMUN.includes(dZ+z) && dZ !== z)) abyss.push('귀문관살');
            
            const cYear = new Date().getFullYear(); const myAge = cYear - sol.getYear() + 1;
            let daewun = []; try{ const dyList=bazi.getYun(isMale?1:0).getDaYun(); for(let i=0;i<8;i++)if(dyList[i])daewun.push({age:dyList[i].getStartAge(), ganzhi:dyList[i].getGanZhi()}); }catch(err){}
            const curDw = daewun.find(dw => myAge >= dw.age) || daewun[0] || {age:1, ganzhi:'甲子'};

            return { 
                ch, oh, dG, dZ, branchStates, isTougan, rootScore, isJong, trueGyuk, yong, hee, gi, scores, logs,
                w12_p: n12[map[dG]?.indexOf(dZ)] || '알수없음', w12_s: n12[map[dG]?.indexOf(mZ)] || '알수없음', 
                gm: {chars: gm.join(', '), pos: gmPos}, abyss, daewun, curDw, cYear, hStr, solStr: `${sol.getYear()}년 ${sol.getMonth()}월 ${sol.getDay()}일 ${hStr!=='none'?(hStr==='yaja'?'야자시':(hStr==='joja'?'조자시':hr+'시'+(min===30?' 30분':''))):'시간모름'}`
            };
        }
    };

    // ==========================================
    // 📁 4. Rendering Engine (UI 모듈화 / 쿠파스 버튼)
    // ==========================================
    const Render = {
        wrap: (c) => `<div class="fade-in-section">${c}</div>`,
        sec: (title, basis, text) => Render.wrap(`<div class="sec-title">${title}</div><div class="detail-text"><p><b class="basis-text">${basis}</b>${text}</p></div>`),
        box: (title, content) => Render.wrap(`<div style="background:rgba(255,255,255,0.03); padding:30px; border-radius:24px; border:1px solid var(--card-border); margin-bottom:50px;">${title ? `<h4 style="color:var(--accent-gold-light); margin-bottom:15px; font-size:1.15rem;">${title}</h4>` : ''}<div class="detail-text" style="font-size:1.05rem;">${content}</div></div>`),
        
        header: (d) => `<div style="text-align:center; padding:20px; background:linear-gradient(135deg, rgba(212,175,55,0.1), transparent); border:1px solid var(--accent-gold); border-radius:24px; margin-bottom:50px;"><h2 style="font-size:2.2rem; color:var(--accent-gold-light); margin-bottom:10px;">${Utils.escapeHTML(d.name)} 님의 운명노트</h2><p style="color:var(--text-muted); font-size:1rem;">${d.solStr}</p></div>`,
        
        pillars: (d) => {
            const getPillarHtml = (gan, zhi, idx) => {
                if(!gan || gan==='모름') return `<div class="pillar"><span>시주</span><b style="color:var(--text-muted);">?</b><b style="color:var(--text-muted);">?</b></div>`;
                const isBroken = d.branchStates[idx] ? d.branchStates[idx].clashCount > 0 : false;
                const isAmp = (idx===2 && d.isTougan); 
                return `<div class="pillar"><span>${['연주','월주','일주(나)','시주'][idx]}</span><b class="${isAmp?'amplified':''}" style="${idx===2?'color:var(--accent-gold-light);':''}">${gan}</b><b class="${isBroken?'broken':''}">${zhi}</b></div>`;
            };
            return Render.wrap(`<div class="sec-title">사주 명식표 및 10년 대운</div><div class="pillar-row">${d.hStr === 'none' ? `<div class="pillar"><span>시주</span><b style="color:var(--text-muted);">?</b><b style="color:var(--text-muted);">?</b></div>` : getPillarHtml(d.ch[6], d.ch[7], 3)}${getPillarHtml(d.ch[4], d.ch[5], 2)}${getPillarHtml(d.ch[2], d.ch[3], 1)}${getPillarHtml(d.ch[0], d.ch[1], 0)}</div>`);
        },

        daewun: (d) => {
            if(!d.daewun || d.daewun.length === 0) return '';
            return Render.wrap(`<div class="daewun-grid">${d.daewun.map(w => `<div class="daewun-col" style="${w.age===d.curDw.age?'border-color:var(--accent-gold); background:rgba(212,175,55,0.1);':''}"><div class="daewun-age">${w.age}세</div><div class="daewun-char">${w.ganzhi.charAt(0)}<br>${w.ganzhi.charAt(1)}</div></div>`).join('')}</div>`);
        },

        terminalLogs: (d) => {
            let logHtml = d.logs.map(l => `<div class="log-${l.level}">> ${Utils.escapeHTML(l.msg)}</div>`).join('');
            return Render.wrap(`<div class="sec-title">우주적 이벤트 스캔 로그 (파이프라인)</div><div class="terminal-box">${logHtml}</div>`);
        },

        chart: (d) => {
            let chart = `<div class="element-chart-container"><div style="text-align:center; font-weight:800; color:#fff; font-size:1.2rem; margin-bottom:30px;">최종 정산: 진(眞) 오행 에너지 비율</div>`;
            let maxTrueE = Math.max(...Object.values(d.scores), 1);
            let totalE = Object.values(d.scores).reduce((a,b)=>a+b, 0);
            ['木','火','土','金','水'].forEach(el => {
                const colors = {'木':'wood','火':'fire','土':'earth','金':'metal','水':'water'};
                let percentage = ((d.scores[el]/totalE)*100).toFixed(1);
                chart += `<div class="bar-wrap"><div class="bar-label" style="color:var(--color-${colors[el]})">${el}</div><div class="bar-bg"><div class="bar-fill fill-${colors[el]}" style="width:${(d.scores[el]/maxTrueE)*100}%"></div></div><div style="margin-left:10px; font-weight:700; width:50px; text-align:right;">${percentage}%</div></div>`;
            });
            chart += `<p style="font-size:0.85rem; color:var(--text-muted); text-align:center; margin-top:20px;">* 월령 가중치, 투간 증폭, 합화/상충 파괴가 모두 수학적으로 반영된 전문가용 절대 점수입니다.</p></div>`;
            return Render.wrap(chart);
        },

        analysis: (d) => {
            let masterHtml = `<div style="background:linear-gradient(135deg, rgba(212,175,55,0.05), rgba(0,0,0,0.5)); padding:30px; border-radius:24px; border:1px solid var(--accent-gold); margin-bottom:50px;">`;
            masterHtml += `<p style="margin-bottom:25px; font-size:1.1rem;"><b class="basis-text">뿌리(通根) 강도 스캔:</b> 천간(나)이 지지에 내린 뿌리 점수는 <b>[${d.rootScore}점]</b>입니다. <span style="font-size:1.05rem; color:var(--text-muted); display:block; margin-top:10px; line-height:1.7;">${d.rootScore >= 3 ? '외풍에 흔들림 없이 튼튼한 멘탈과 주관을 가졌습니다.' : d.rootScore > 0 ? '미약하나마 속으로 버티는 내면의 힘이 있습니다.' : '뿌리가 없어 환경 변화에 몹시 예민하게 반응합니다.'}</span></p>`;
            masterHtml += `<p style="margin-bottom:25px; font-size:1.1rem;"><b class="basis-text">십이운성(十二運星):</b> 사회적 역량은 <b>[${d.w12_s}]</b>, 내면의 기운은 <b>[${d.w12_p}]</b>입니다.<br><span style="font-size:1.05rem; color:var(--text-muted); display:block; margin-top:10px; line-height:1.7;">${MYSTIC_DATA.WOUNSUNG_DB[d.w12_p] || ''}</span></p>`;
            
            if(d.gm.pos.length > 0) {
                let gmDesc = d.gm.pos.map(pos => MYSTIC_DATA.GONGMANG_DB[pos] || '').join('<br><br>');
                masterHtml += `<p style="margin-bottom:25px; font-size:1.1rem;"><b class="basis-text">공망(空亡) 탐지 (${d.gm.chars}):</b> 명식 중 <b>${d.gm.pos.join(', ')}</b> 자리에 공망이 들었습니다.<br><span style="font-size:1.05rem; color:var(--text-muted); display:block; margin-top:10px; line-height:1.7;">${gmDesc}</span></p>`;
            }

            if(d.abyss.length > 0) {
                d.abyss.forEach(a => { masterHtml += `<p style="margin-bottom:20px; font-size:1.1rem;"><b class="basis-text">${a}:</b> <span style="font-size:1.05rem; color:var(--text-muted); display:block; margin-top:10px; line-height:1.7;">${MYSTIC_DATA.SHIN_SAL_EXT[a]?.d || ''}</span></p>`; });
            }
            masterHtml += `</div>`;
            
            let h = Render.sec("🌌 전문가 엔진: 심연 스캔", "통근, 합화, 12운성, 공망을 스캔한 결과입니다.", "") + Render.wrap(masterHtml);
            
            h += Render.sec("🧭 운명의 가이드 (용/희/기신)", `정밀 계산된 당신의 수호 기운 3단계입니다.`, "") + Render.box("", `<p style="margin-bottom:10px;">🟢 <b>용신(나를 살리는 구원자):</b> ${MYSTIC_DATA.YONGSHIN_DB[d.yong]?.n || d.yong}</p><p style="margin-bottom:10px;">🟡 <b>희신(용신을 돕는 우군):</b> ${d.hee} 기운</p><p>🔴 <b>기신(나를 흔드는 흉한 덫):</b> ${d.gi} 기운을 철저히 경계하세요.</p><hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;"><p style="font-size:0.95rem; color:var(--text-muted);">${MYSTIC_DATA.YONGSHIN_DB[d.yong]?.d || ''}</p>`);
            
            const gyukDesc = MYSTIC_DATA.GYUKGUK_DB[d.trueGyuk.replace('격','')]?.d || "비범한 그릇을 지녔습니다.";
            h += Render.sec("🏛️ 격국 (운명의 그릇)", d.isJong ? `<b style="color:#ff4757;">[특수격 전환]</b> 당신은 세력에 순응하는 [${d.trueGyuk}]입니다.` : `당신의 진짜 격국은 [${d.trueGyuk}]입니다.`, `<br>${gyukDesc}`);

            const myJigan = MYSTIC_DATA.JIGAN_DB[d.dG] || {desc:'자신의 주관을 믿으세요.'};
            h += Render.sec("🌱 인생의 흐름", "본원의 기질과 평생운:", `<br><b>나의 본질:</b> ${myJigan.desc}<br><br><b>초년:</b> ${MYSTIC_DATA.LIFETIME_DB.e[d.oh] || ''}<br><br><b>중년:</b> ${MYSTIC_DATA.LIFETIME_DB.m[d.oh] || ''}<br><br><b>말년:</b> ${MYSTIC_DATA.LIFETIME_DB.l[d.oh] || ''}`);
            h += Render.sec("💎 입체 통변", "분야별 상세 분석:", `<br><b>💰 부의 연금술:</b> ${MYSTIC_DATA.LIFETIME_DB.w[d.oh] || ''}<br><br><b>💼 별이 내린 천직:</b> ${MYSTIC_DATA.LIFETIME_DB.c[d.oh] || ''}<br><br><b>❤️ 사랑의 주파수:</b> ${MYSTIC_DATA.LIFETIME_DB.l_v[d.oh] || ''}<br><br><b>👨‍👩‍👧‍👦 가족:</b> ${MYSTIC_DATA.LIFETIME_DB.f[d.oh] || ''}<br><br><b>💪 건강:</b> ${MYSTIC_DATA.LIFETIME_DB.h[d.oh] || ''}`);
            
            return h;
        },

        timeline: (d) => {
            let timelineHtml = ''; 
            const bA = MYSTIC_DATA.TIMELINE_DB.animals;
            const tA = MYSTIC_DATA.TIMELINE_DB.desc;
            for(let i=0; i<10; i++) { 
                let y=d.cYear+i; let idx=(y-4)%12; 
                timelineHtml += `<div class="timeline-item"><div class="timeline-point"></div><div class="timeline-year">${y}년 <span style="font-size:0.85rem; font-weight:500; color:#fff; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:12px; margin-left:10px; border:1px solid rgba(255,255,255,0.2);">${bA[idx]}의 해</span></div><div class="detail-text" style="font-size:1.05rem;">${tA[idx]}</div></div>`; 
            }
            return Render.wrap(`<div class="sec-title">📈 향후 10년 운명 타임라인</div><div class="timeline">${timelineHtml}</div>`);
        },

        actionBox: (yongshin) => {
            const seed = Math.floor(Math.random() * 9) + 1;
            const p = { 
                '木':{n:'마음챙김 에세이',l:'추천 도서',i:'📖',d:'정동쪽',c:'그린'}, '火':{n:'디퓨저',l:'행운 아이템',i:'🕯️',d:'정남쪽',c:'레드'}, 
                '土':{n:'다기세트',l:'행운 아이템',i:'🍵',d:'중앙',c:'황색'}, '金':{n:'메탈시계',l:'행운 아이템',i:'⌚',d:'정서쪽',c:'실버'}, 
                '水':{n:'가습기',l:'행운 아이템',i:'💧',d:'정북쪽',c:'블랙'} 
            };
            const cLuck = p[yongshin] || p['土'];
            
            return Render.wrap(`<div style="margin-top:100px; padding:50px 30px; border-radius:30px; background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.5)); border:1px solid var(--card-border); text-align:center;">
                <h2 style="color:#fff; font-size:1.6rem; margin-bottom:30px;">✨ 운명을 바꾸는 처방</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px; margin-bottom:40px;">
                    <div style="background:rgba(0,0,0,0.3); padding:25px 10px; border-radius:20px; border:1px solid var(--card-border);"><span style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:8px;">수호 컬러</span><b style="color:var(--accent-gold-light); font-size:1.3rem;">${cLuck.c}</b></div>
                    <div style="background:rgba(0,0,0,0.3); padding:25px 10px; border-radius:20px; border:1px solid var(--card-border);"><span style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:8px;">행운 방위</span><b style="color:var(--accent-gold-light); font-size:1.3rem;">${cLuck.d}</b></div>
                    <div style="background:rgba(0,0,0,0.3); padding:25px 10px; border-radius:20px; border:1px solid var(--card-border);"><span style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:8px;">행운 숫자</span><b style="color:var(--accent-gold-light); font-size:1.3rem;">${seed}</b></div>
                </div>
                <div style="background:rgba(255,255,255,0.03); border-radius:24px; padding:25px 30px; margin-bottom:40px; font-size:1.05rem; line-height:1.8; color:var(--text-main); text-align:justify; border:1px solid var(--card-border);">
                    <p><b class="basis-text" style="color:var(--text-main); font-size:1.05rem; margin-bottom:10px;">🔍 처방 근거: </b>정밀 스캔된 당신의 <b>[${MYSTIC_DATA.YONGSHIN_DB[yongshin]?.n || yongshin} 용신]</b> 기운을 집중 보강하기 위해 도출된 맞춤형 개운 아이템입니다.</p>
                </div>
                <a href="https://www.coupang.com/np/search?q=${encodeURIComponent(cLuck.n)}&utm_source=affiliate" target="_blank" class="btn-rec btn-coupang">🛒 ${cLuck.i} 특가 [ ${cLuck.n} ] 보러가기</a>
                <div style="margin-top:25px; font-size:0.75rem; color:var(--text-muted); opacity:0.5;">이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다.</div>
            </div>`);
        },

        saju: function(d) {
            return this.header(d) + this.pillars(d) + this.daewun(d) + this.terminalLogs(d) + this.chart(d) + this.analysis(d) + this.timeline(d) + this.actionBox(d.yong);
        },

        gunghap: function(me, you) {
            let score = 70;
            const isMeHeeshin = (me.yong === you.oh || me.hee === you.oh);
            const isYouHeeshin = (you.yong === me.oh || you.hee === me.oh);
            if (isMeHeeshin && isYouHeeshin) score += 20; else if (isMeHeeshin || isYouHeeshin) score += 10; else score -= 10;

            const ganHab = { '甲':'己', '己':'甲', '乙':'庚', '庚':'乙', '丙':'辛', '辛':'丙', '丁':'壬', '壬':'丁', '戊':'癸', '癸':'戊' };
            if(ganHab[me.dG] === you.dG) score += 15;
            RULES.CLASH.forEach(cp => { if((me.dZ===cp[0] && you.dZ===cp[1]) || (me.dZ===cp[1] && you.dZ===cp[0])) score -= 20; });

            if (score > 99) score = 98; if (score < 40) score = 42;
            const res = MYSTIC_DATA.GUNGHAP_DB[score >= 85 ? 'good' : (score >= 60 ? 'normal' : 'bad')];

            let h = `<div class="daily-fortune" style="padding:40px 20px;"><div style="font-size:1.2rem; color:var(--accent-gold-light); font-weight:700; margin-bottom:10px;">우주적 궁합지수</div><div style="font-size:4rem; font-weight:800; color:#fff; margin-bottom:15px; line-height:1;">${score}<span style="font-size:1.5rem;">점</span></div><p style="font-size:1.2rem; color:var(--text-muted);">"${res.t}"</p></div>`;
            h += `<div style="display:flex; justify-content:center; align-items:center; gap:15px; margin-bottom:50px;"><div class="pillar" style="flex:1; padding:30px 10px;"><span style="font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:15px;">${Utils.escapeHTML(me.name)}</span><b style="color:var(--accent-gold-light); font-size:2.2rem;">${me.dG}</b><b style="font-size:2.2rem;">${me.dZ}</b></div><div style="font-size:2.5rem;">💖</div><div class="pillar" style="flex:1; padding:30px 10px;"><span style="font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:15px;">${Utils.escapeHTML(you.name)}</span><b style="color:var(--accent-gold-light); font-size:2.2rem;">${you.dG}</b><b style="font-size:2.2rem;">${you.dZ}</b></div></div>`;
            h += Utils.UI_Box("👩‍❤️‍👨 우주적 인연의 결론", res.d);
            h += Utils.UI_Sec("🤝 희/용신 교차 분석", "서로의 기운 보완 여부:", `<br>분석 결과 [${Utils.escapeHTML(me.name)}]님에게 평생 가장 절실한 수호 기운인 <b>[${MYSTIC_DATA.YONGSHIN_DB[me.yong]?.n || me.yong}]</b> 에너지를 [${Utils.escapeHTML(you.name)}]님이 ${isMeHeeshin ? '아주 넉넉하게 뿜어내어 완벽히 채워주고 있습니다. 긍정적인 시너지가 폭발합니다.' : '채워주기에는 다소 부족합니다. 각자의 방식으로 부족함을 채워나가며 의지해야 하는 어른스러운 관계입니다.'}`);
            return h + this.actionBox(me.yong);
        },

        tojeong: function(d) {
            const poem = MYSTIC_DATA.TOJEONG_DB.poems[0];
            let h = `<div style="text-align:center; margin:50px 0;"><span style="font-size:3.5rem; font-weight:800; color:var(--accent-gold); letter-spacing:4px; text-shadow:0 0 30px rgba(212,175,55,0.5);">2026 신수</span></div>` + 
                    Utils.UI_Box("📜 신년 사언절구", `<p style="font-size:2.2rem; color:var(--accent-gold-light); text-align:center; letter-spacing:10px; margin-bottom:15px; font-family:'Batang',serif;">${poem.hj}</p><p style="text-align:center; font-weight:700; font-size:1.2rem; margin-bottom:15px;">"${poem.kr}"</p><p style="text-align:center; color:var(--text-muted); font-size:1rem;">${poem.desc}</p>`);
            h += Utils.UI_Sec("신수 리포트", "2026년 전체 흐름:", `<br><br>${MYSTIC_DATA.TOJEONG_DB.tA[1]}`);
            return h + this.actionBox(d.yong);
        }
    };

    // ==========================================
    // 📁 5. Application Controller (Error Boundary)
    // ==========================================
    const App = {
        isGunghapMode: false,
        toggleGunghap: function() {
            this.isGunghapMode = !this.isGunghapMode;
            document.getElementById('partner-input-area').style.display = this.isGunghapMode ? 'block' : 'none';
            document.getElementById('gun-title').innerText = this.isGunghapMode ? "궁합 취소" : "인연 궁합";
            document.getElementById('gun-icon').innerText = this.isGunghapMode ? "❌" : "❤️";
            if(this.isGunghapMode) document.getElementById('partner-input-area').scrollIntoView({behavior:'smooth'});
        },
        animateLoader: function(type, callback) {
            const loader = document.getElementById('loader'), loaderText = document.getElementById('loader-text');
            loader.style.display = 'flex';
            const msgs = { saju:["동경 135도 보정 중...", "지지충(相沖) 중첩 파괴 스캔...", "본기/중기/여기 투간 증폭...", "계절 삼합(合化) 조건부 승인...", "조후(Climate) 우선 용신 엔진 가동...", "운명노트 작성 완료."], gunghap:["두 사람의 시공간 동기화 중...", "천간합 및 지지충 스캔 중...", "상호 용/희/기신 보완율 정밀 계산 중...", "궁합 리포트 완성 중..."], tojeong:["태세 및 일진 작괘 중...", "운명 코드 도출 중...", "12개월 정밀 타임라인 구성 중..."] }[type] || ["운명 해독 중..."];
            let idx = 0; loaderText.innerText = msgs[0];
            const iv = setInterval(() => { idx++; if(idx < msgs.length) loaderText.innerText = msgs[idx]; }, 600);
            setTimeout(() => { clearInterval(iv); callback(); }, msgs.length * 600 + 300);
        },
        start: function(type) {
            if (typeof Solar === "undefined" || typeof Lunar === "undefined") return Utils.showModal("명리 엔진 서버 로딩에 실패했습니다. 네트워크를 확인하고 새로고침 해주세요.", true);
            let name = Utils.escapeHTML(document.getElementById('user-name').value.trim());
            if(!name) return Utils.showModal("성함을 입력해주세요.");
            const y=parseInt(document.getElementById('user-year').value), m=parseInt(document.getElementById('user-month').value), d=parseInt(document.getElementById('user-day').value);
            if(!Utils.isValidDate(y, m, d)) return Utils.showModal("입력하신 날짜가 유효하지 않습니다. (예: 2월 31일 등)");
            
            this.animateLoader(type, () => {
                try {
                    const isMale = document.getElementById('user-gender').value === 'male';
                    const t=document.getElementById('user-time').value, cal=document.getElementById('user-cal').value;
                    let me;
                    
                    try { 
                        me = Pipeline.run(y, m, d, t, cal, isMale); 
                        me.name = name; 
                    } catch(e) { 
                        console.error(e); Utils.showModal("명리 엔진 연산 오류가 발생했습니다. 입력값을 확인해주세요."); 
                        document.getElementById('loader').style.display='none'; return; 
                    }

                    let h = "";
                    if(type === 'gunghap') {
                        let pName = Utils.escapeHTML(document.getElementById('partner-name').value.trim());
                        if(!pName) { document.getElementById('loader').style.display='none'; return Utils.showModal("상대방 이름을 입력해주세요."); }
                        const py=parseInt(document.getElementById('p-year').value), pm=parseInt(document.getElementById('p-month').value), pd=parseInt(document.getElementById('p-day').value);
                        if(!Utils.isValidDate(py, pm, pd)) { document.getElementById('loader').style.display='none'; return Utils.showModal("상대방의 날짜가 유효하지 않습니다."); }
                        
                        const you = Pipeline.run(py, pm, pd, document.getElementById('p-time').value, document.getElementById('p-cal').value, document.getElementById('p-gender').value === 'male');
                        you.name = pName;
                        h = Render.gunghap(me, you);
                    } else if(type === 'tojeong') { h = Render.tojeong(me); } 
                    else { h = Render.saju(me); }

                    document.getElementById('report-content').innerHTML = h;
                    document.getElementById('loader').style.display='none';
                    document.getElementById('home-view').style.display='none';
                    document.getElementById('result-view').style.display='block';
                    
                    const observer = new IntersectionObserver(entries => {
                        entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('is-visible'); observer.unobserve(entry.target); } });
                    }, { threshold: 0.1 });
                    
                    const sections = document.querySelectorAll('.fade-in-section');
                    sections.forEach((el, index) => { if (index < 40) observer.observe(el); else el.classList.add('is-visible'); });
                    window.scrollTo(0,0);
                } catch(e) { console.error(e); Utils.showModal("분석 중 치명적인 오류가 발생했습니다."); document.getElementById('loader').style.display='none'; }
            });
        },
        goHome: function() { location.reload(); },
        downloadImage: function() { 
            if (typeof html2canvas === "undefined") return Utils.showModal("캡처 모듈을 불러오지 못했습니다.");
            document.getElementById('loader').style.display='flex'; document.getElementById('loader-text').innerText="결과 이미지를 생성 중입니다...";
            setTimeout(() => {
                const wrap = document.getElementById('report-wrap');
                const scaleValue = (window.innerWidth < 600 || wrap.offsetHeight > 4500) ? 1 : Math.min(2, window.devicePixelRatio || 1);
                html2canvas(wrap, { scale: scaleValue, backgroundColor: '#05070a', useCORS: true }).then(c=>{ 
                    document.getElementById('loader').style.display='none'; 
                    let a=document.createElement('a'); a.download='운명노트_결과.png'; a.href=c.toDataURL('image/jpeg', 0.8); a.click(); 
                }).catch(err => { console.error(err); document.getElementById('loader').style.display='none'; Utils.showModal("메모리 부족으로 캡처에 실패했습니다."); });
            }, 100);
        },
        shareReport: async function() { 
            if (navigator.share) { try { await navigator.share({ title: '운명노트', text: '나의 소름돋는 운명노트 분석 결과를 확인해보세요!', url: window.location.href }); } catch(err) { console.error(err); } } 
            else { const dummy = document.createElement('input'); document.body.appendChild(dummy); dummy.value = window.location.href; dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy); Utils.showModal("링크가 복사되었습니다."); } 
        },
        init: function() {
            const yS=document.getElementById('user-year'), mS=document.getElementById('user-month'), dS=document.getElementById('user-day'), py=document.getElementById('p-year'), pm=document.getElementById('p-month'), pd=document.getElementById('p-day');
            [yS, py].forEach(s => { for(let i=2025;i>=1930;i--) s.add(new Option(i+'년', i)); });
            [mS, pm].forEach(s => { for(let i=1;i<=12;i++) s.add(new Option(i+'월', i)); });
            [dS, pd].forEach(s => { for(let i=1;i<=31;i++) s.add(new Option(i+'일', i)); });
            yS.value = 1995; py.value = 1995;
            
            const tk = 'destinote_total', dk = 'destinote_today_' + new Date().toDateString();
            let total = parseInt(localStorage.getItem(tk) || 2480) + 1, today = parseInt(localStorage.getItem(dk) || 12) + 1;
            localStorage.setItem(tk, total); localStorage.setItem(dk, today);
            document.getElementById('visitor-ui').innerHTML = `🌟 오늘 <b>${today}</b>명 · 누적 <b>${total}</b>명이 운명을 해독했습니다.`;

            const checkLoad = setInterval(() => {
                if (typeof Solar !== 'undefined' && typeof html2canvas !== 'undefined') {
                    clearInterval(checkLoad);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                }
            }, 200);
            setTimeout(() => { clearInterval(checkLoad); if(typeof Solar === 'undefined') Utils.showModal("서버 상태가 불안정합니다. 새로고침 해주세요.", true); }, 5000);
        }
    };

    window.onload = () => App.init();
</script>
</body>
</html>
