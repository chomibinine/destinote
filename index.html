    // 2. PRNG (Mulberry32 - 훌륭한 난수 생성기)
    function mulberry32(a) {
        return function() {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    // 3. Saju Logic (Rule-based Engine)

        getOhGan: (c) => { if('甲乙'.includes(c)) return '木'; if('丙丁'.includes(c)) return '火'; if('戊己'.includes(c)) return '土'; if('庚辛'.includes(c)) return '金'; if('壬癸'.includes(c)) return '水'; return ''; },

            if(!tOh) return '-';
            const sameYin = isYin(meGan) === isYin(target);
            if (meOh === tOh) return sameYin ? '비견' : '겁재';
            if (Logic.REL[meOh].gen === tOh) return sameYin ? '식신' : '상관';
            if (Logic.REL[meOh].ctrl === tOh) return sameYin ? '편재' : '정재';
            if (Logic.REL[meOh].ctrlBy === tOh) return sameYin ? '편관' : '정관';
            if (Logic.REL[meOh].genBy === tOh) return sameYin ? '편인' : '정인';
            return '-';
        }
    };

    // 4. API Main Handler
    const analyze = (req) => {
        const { y, m, d, hStr, cal, isMale } = req;
        
        // Exception Handling for Lunar
        if(typeof window.Lunar === 'undefined') throw new Error("명리 엔진이 로드되지 않았습니다.");
        
        let hr = 12; let dayOffset = false;
        if(hStr === 'yaja') { hr = 23; dayOffset = true; } else if(hStr === 'joja') hr = 0; else if(hStr !== 'none') hr = parseInt(hStr);

        let sol, lun;
        if(cal === 'solar'){ sol = window.Solar.fromYmdHms(y,m,d,hr,30,0); if(dayOffset) sol = sol.nextDay(); lun = sol.getLunar(); } 
        else { lun = window.Lunar.fromYmdHms(y,m,d,hr,30,0); sol = lun.getSolar(); if(dayOffset) { sol = sol.nextDay(); lun = sol.getLunar(); } } 
        
        if(!lun || lun.getYear() === -1) throw new Error("계산할 수 없는 날짜입니다.");

        const bazi = lun.getEightChar();
        const dG = bazi.getDayGan(); const dmEl = Logic.getOhGan(dG); const rel = Logic.REL[dmEl];
        const stems = [bazi.getYearGan(), bazi.getMonthGan(), bazi.getDayGan(), hStr !== 'none' ? bazi.getTimeGan() : '-'].filter(x=>x!=='-');
        const branches = [bazi.getYearZhi(), bazi.getMonthZhi(), bazi.getDayZhi(), hStr !== 'none' ? bazi.getTimeZhi() : '-'].filter(x=>x!=='-');

        let elements = { '木':0, '火':0, '土':0, '金':0, '水':0 };
        let tenGods = { '정관':0, '편관':0, '정재':0, '편재':0, '식신':0, '상관':0, '비견':0, '겁재':0, '정인':0, '편인':0 };

        // Basic calculation
        [...stems, ...branches].forEach(c => { const e = Logic.getOhGan(c) || Logic.getOhZhi(c); if(e) elements[e]++; });
        stems.forEach(c => { if(c!==dG) { const g = Logic.get10God(dG, c); if(g!=='-') tenGods[g]++; } });
        branches.forEach(b => { const g = Logic.get10God(dG, b); if(g!=='-') tenGods[g]++; }); // Simplified for SaaS fast logic

        const myForce = elements[dmEl] + elements[rel.genBy];
        const totalE = Object.values(elements).reduce((a,b)=>a+b,0) || 1;
        const strength = (myForce / totalE) >= 0.45 ? "신강" : "신약";

        let yongsin = strength === '신강' ? rel.ctrlBy : rel.genBy; 
        if(elements[yongsin] === 0) yongsin = strength === '신강' ? rel.gen : rel.same; // Fallback
        
        const now = new Date();
        const solNow = window.Solar.fromDate(now);
        const yearForSaeun = ((solNow.getMonth() < 2) || (solNow.getMonth() === 2 && solNow.getDay() < 4)) ? solNow.getYear() - 1 : solNow.getYear();
        const saeunGZ = window.Lunar.fromYmd(yearForSaeun, 1, 1).getYearInGanZhi();

        const seedInt = y * 10000 + m * 100 + d;
        const rand = mulberry32(seedInt); // PRNG

        // Independent Category Scoring
        const getTiming = (target) => {
            const luckG = Logic.get10God(dG, saeunGZ.charAt(0));
            return (luckG !== '-' && luckG.includes(target)) ? 15 : 0;
        };

        const loveScore = (isMale ? (tenGods['정재']+tenGods['편재']) : (tenGods['정관']+tenGods['편관'])) > 0 ? 15 : -10;
        const wealthScore = (tenGods['정재']+tenGods['편재']) > 0 ? 15 : -15;
        const careerScore = (tenGods['정관']+tenGods['편관']) > 0 ? 15 : -5;

        // Dynamic Template Generation
        const generatePara = (cat, tags) => {
            const db = DB[cat];
            let tag = tags.find(t => db[t]);
            if(!tag) return [{ type: 'p', text: "무난하고 평온한 흐름이 유지됩니다." }];
            
            let blocks = [];
            const data = db[tag];
            blocks.push({ type: 'p', text: `${data.hook[Math.floor(rand() * data.hook.length)]} <b>${data.core[0]}</b>`});
            blocks.push({ type: 'p', text: data.detail[0] });
            if(rand() > 0.5) blocks.push({ type: 'warning', text: `[주의] ${data.warning[0]}`});
            if(rand() > 0.6) blocks.push({ type: 'trigger', text: `💡 ${TRIGGERS[Math.floor(rand() * TRIGGERS.length)]}`});
            
            return blocks;
        };

        // JSON Response Structure
        const getGrade = (s) => s >= 15 ? 'S' : (s >= 5 ? 'A' : (s >= -5 ? 'B' : 'C'));

        const res = {
            status: "success",
            data: {
                meta: { name: req.name || "당신", year: saeunGZ, yongsin },
                dashboard: {
                    love: { score: loveScore, grade: getGrade(loveScore) },
                    wealth: { score: wealthScore, grade: getGrade(wealthScore) },
                    career: { score: careerScore, grade: getGrade(careerScore) }
                },
                reports: {
                    love: {
                        title: "연애와 인연의 궤도",
                        timing: getTiming(isMale ? '재' : '관') > 0 ? "올해 운명적인 인연의 파동이 강합니다." : "관계 유지에 힘써야 합니다.",
                        paragraphs: generatePara('LOVE', loveScore > 0 ? ["배우자성_존재"] : ["배우자성_미약"])
                    },
                    wealth: {
                        title: "재물과 흐름의 알고리즘",
                        timing: getTiming('재') > 0 ? "재물의 흐름이 극대화되는 수확의 타이밍입니다." : "지출 방어가 생존의 핵심입니다.",
                        paragraphs: generatePara('WEALTH', wealthScore > 0 ? ["돈흐름_존재"] : ["무재성"])
                    },
                    career: {
                        title: "직업과 명예의 파동",
                        timing: getTiming('관') > 0 ? "명예가 급상승하고 조직 내 입지가 강력해집니다." : "무리한 변동보다 내실을 다지십시오.",
                        paragraphs: generatePara('CAREER', careerScore > 0 ? ["조직적합"] : ["창의직"])
                    }
                }
            }
        };

        // Determine worst category for CTA
        let worst = 'love'; let mSc = loveScore;
        if(wealthScore < mSc) { mSc = wealthScore; worst = 'wealth'; }
        if(careerScore < mSc) { mSc = careerScore; worst = 'career'; }
        res.data.meta.worstCategory = worst;

        return res;
    };

    return { analyze };
})();
