<script>
    let MYSTIC_DATA = null;
    let isGunghapMode = false;

    // --- 엔진 헬퍼 (옵셔널 체이닝 방어 완비) ---
    function getOh(c) { if('甲乙寅卯'.includes(c)) return '木'; if('丙丁巳午'.includes(c)) return '火'; if('戊己辰戌丑未'.includes(c)) return '土'; if('庚辛申酉'.includes(c)) return '金'; if('壬癸亥子'.includes(c)) return '水'; return ''; }
    function wrap(c) { return `<div class="fade-in-section">${c}</div>`; }
    function UI_Sec(title, basis, text, ext="") { return wrap(`<div class="sec-title">${title}</div><div class="detail-text" ${ext?'style="margin-bottom:40px;"':''}><p><b class="basis-text">${basis}</b>${text}</p></div>${ext}`); }
    function UI_Box(title, content) { return wrap(`<div style="background:rgba(255,255,255,0.03); padding:30px; border-radius:24px; border:1px solid var(--card-border); margin-bottom:50px;">${title ? `<h4 style="color:var(--accent-gold-light); margin-bottom:15px; font-size:1.15rem;">${title}</h4>` : ''}<div class="detail-text" style="font-size:1.05rem;">${content}</div></div>`); }

    // 12운성 매핑 로직
    const W12_MAP = {
        '甲': ['亥','子','丑','寅','卯','辰','巳','午','未','申','酉','戌'], '丙': ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'],
        '戊': ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'], '庚': ['巳','午','未','申','酉','戌','亥','子','丑','寅','卯','辰'],
        '壬': ['申','酉','戌','亥','子','丑','寅','卯','辰','巳','午','未'], '乙': ['午','巳','辰','卯','寅','丑','子','亥','戌','酉','申','未'],
        '丁': ['酉','申','未','午','巳','辰','卯','寅','丑','子','亥','戌'], '己': ['酉','申','未','午','巳','辰','卯','寅','丑','子','亥','戌'],
        '辛': ['子','亥','戌','酉','申','未','午','巳','辰','卯','寅','丑'], '癸': ['卯','寅','丑','子','亥','戌','酉','申','未','午','巳','辰']
    };
    const W12_NAMES = ['장생', '목욕', '관대', '건록', '제왕', '쇠', '병', '사', '묘', '절', '태', '양'];
    const get12W = (stem, branch) => W12_NAMES[W12_MAP[stem]?.indexOf(branch)] || '알수없음';

    // 합충파해 관계식
    const ganHab = { '甲':'己', '己':'甲', '乙':'庚', '庚':'乙', '丙':'辛', '辛':'丙', '丁':'壬', '壬':'丁', '戊':'癸', '癸':'戊' };
    const zhiChung = { '子':'午', '午':'子', '丑':'未', '未':'丑', '寅':'申', '申':'寅', '卯':'酉', '酉':'卯', '辰':'戌', '戌':'辰', '巳':'亥', '亥':'巳' };
    const motherEls={'木':'水','火':'木','土':'火','金':'土','水':'金'}, childEls={'木':'火','火':'土','土':'金','金':'水','水':'木'};
    const wealthEls={'木':'土','火':'金','土':'水','金':'木','水':'火'}, powerEls={'木':'金','火':'水','土':'木','金':'火','水':'土'};

    function toggleGunghap() {
        isGunghapMode = !isGunghapMode;
        document.getElementById('partner-input-area').style.display = isGunghapMode ? 'block' : 'none';
        document.getElementById('gun-title').innerText = isGunghapMode ? "궁합 분석하기" : "인연 궁합";
        document.getElementById('gun-icon').innerText = isGunghapMode ? "🔍" : "❤️";
        if(isGunghapMode) document.getElementById('partner-input-area').scrollIntoView({behavior:'smooth'});
        else handleStart('gunghap');
    }

    // --- 핵심 로직 엔진 ---
    function getBazi(y, m, d, cal, hStr) {
        let hr = 12, min = 0;
        if(hStr === 'yaja') { hr = 23; min = 45; }
        else if(hStr === 'joja') { hr = 0; min = 30; }
        else if(hStr !== 'none') { hr = parseInt(hStr); min = 0; }

        let sol, lun;
        if(cal==='solar'){ sol=Solar.fromYmdHms(y,m,d,hr,min,0); lun=sol.getLunar(); } else { lun=Lunar.fromYmdHms(y,m,d,hr,min,0); sol=lun.getSolar(); }
        
        const b = lun.getEightChar();
        const ch = [b.getYearGan(), b.getYearZhi(), b.getMonthGan(), b.getMonthZhi(), b.getDayGan(), b.getDayZhi(), hStr==='none'?'모름':b.getTimeGan(), hStr==='none'?'모름':b.getTimeZhi()];
        const e = {'木':0,'火':0,'土':0,'金':0,'水':0}; ch.forEach(c=>{ let el=getOh(c); if(el) e[el]++; });
        
        return { ch, oh:getOh(ch[4])||'木', dG:ch[4]||'甲', dZ:ch[5]||'子', mZ:ch[3]||'子', e, solStr:`${sol.getYear()}년 ${sol.getMonth()}월 ${sol.getDay()}일 ${hStr!=='none'?(hStr==='yaja'?'야자시':(hStr==='joja'?'조자시':hr+'시')):'시간모름'}`, bazi:b, age:new Date().getFullYear()-y+1, hStr };
    }

    function calculatePersonal(d, isMale) {
        const br = [d.ch[1], d.ch[3], d.ch[5], d.ch[7]];
        const pillars = [d.ch[0]+d.ch[1], d.ch[2]+d.ch[3], d.ch[4]+d.ch[5], d.hStr==='none'?'':d.ch[6]+d.ch[7]];
        
        // 1. 살(殺) 스캔 (누락된 백호, 괴강, 홍염, 도화, 역마, 화개 + 심연의 살 모두 스캔)
        let shinSal = [];
        let abyss = [];
        
        // 도화, 역마, 화개
        if(br.includes('子')||br.includes('午')||br.includes('卯')||br.includes('酉')) shinSal.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['도화살'] || {n:'도화살', d:'대중의 시선을 사로잡는 화려한 스타성을 의미합니다.'});
        if(br.includes('寅')||br.includes('申')||br.includes('巳')||br.includes('亥')) shinSal.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['역마살'] || {n:'역마살', d:'넓은 세계와 교류하며 부를 창출하는 활동력입니다.'});
        if(br.includes('辰')||br.includes('戌')||br.includes('丑')||br.includes('未')) shinSal.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['화개살'] || {n:'화개살', d:'예술적 감수성과 철학적 탐구력을 갖추었습니다.'});
        
        // 백호, 괴강, 홍염
        if(pillars.some(p=>['甲辰','乙未','丙戌','丁丑','戊辰','壬戌','癸丑'].includes(p))) shinSal.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['백호대살'] || {n:'백호대살', d:'위기에 굴하지 않는 폭발적인 돌파력입니다.'});
        if(pillars.some(p=>['庚辰','庚戌','壬辰','壬戌','戊戌'].includes(p))) shinSal.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['괴강살'] || {n:'괴강살', d:'무리를 이끄는 카리스마와 절대적인 리더십입니다.'});
        if(pillars.some(p=>['甲午','丙寅','丁未','戊辰','庚戌','辛酉','壬子'].includes(p))) shinSal.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['홍염살'] || {n:'홍염살', d:'주변을 자석처럼 홀리는 타고난 마성입니다.'});
        
        // 천을귀인
        const cheonEulMap = {'甲':['丑','未'],'戊':['丑','未'],'庚':['丑','未'],'乙':['子','申'],'己':['子','申'],'丙':['亥','酉'],'丁':['亥','酉'],'辛':['寅','午'],'壬':['巳','卯'],'癸':['巳','卯']};
        if(cheonEulMap[d.dG] && br.some(z=>cheonEulMap[d.dG].includes(z))) shinSal.unshift(MYSTIC_DATA?.SHIN_SAL_EXT?.['천을귀인'] || {n:'천을귀인', d:'사주 최고의 길신으로 어떠한 재난도 피해갑니다.'});

        // 심연 (삼형, 원진, 귀문)
        if((br.includes('寅')&&br.includes('巳')&&br.includes('申')) || (br.includes('丑')&&br.includes('戌')&&br.includes('未'))) abyss.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['삼형살'] || {n:'삼형살',d:'기운이 부딪히는 역동성이 있습니다.'});
        if(br.some(z => ['子未','丑午','寅酉','卯申','辰亥','巳戌'].some(pair => pair.includes(d.dZ) && pair.includes(z) && d.dZ !== z))) abyss.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['원진살'] || {n:'원진살',d:'애증의 굴곡을 뜻합니다.'});
        if(br.some(z => ['子酉','丑午','寅未','卯申','辰亥','巳戌'].some(pair => pair.includes(d.dZ) && pair.includes(z) && d.dZ !== z))) abyss.push(MYSTIC_DATA?.SHIN_SAL_EXT?.['귀문관살'] || {n:'귀문관살',d:'천재적인 직관력이 공존합니다.'});

        d.shinSal = shinSal;
        d.abyss = abyss;
        
        // 2. 공망(空亡) 스캔 로직
        const stems = '甲乙丙丁戊己庚辛壬癸', branches = '子丑寅卯辰巳午未申酉戌亥';
        const sIdx = stems.indexOf(d.dG), zIdx = branches.indexOf(d.dZ);
        if (sIdx !== -1 && zIdx !== -1) {
            const gm1 = branches.charAt((10 - sIdx + zIdx) % 12);
            const gm2 = branches.charAt((11 - sIdx + zIdx) % 12);
            let hasGongmang = [];
            if ([gm1, gm2].includes(d.ch[1])) hasGongmang.push('년지');
            if ([gm1, gm2].includes(d.ch[3])) hasGongmang.push('월지');
            if ([gm1, gm2].includes(d.ch[7]) && d.hStr !== 'none') hasGongmang.push('시지');
            d.gongmang = { chars: `${gm1}, ${gm2}`, pos: hasGongmang };
        } else { d.gongmang = { pos: [] }; }

        // 3. 십이운성 스캔
        d.w12 = { social: get12W(d.dG, d.ch[3]), personal: get12W(d.dG, d.ch[5]) };

        // 4. 용신 및 십성 스캔
        const motherEl = motherEls[d.oh], childEl = childEls[d.oh], wealthEl = wealthEls[d.oh], powerEl = powerEls[d.oh];
        const mySc = (d.e[d.oh]||0) + (d.e[motherEl]||0), opSc = (d.e[childEl]||0) + (d.e[wealthEl]||0) + (d.e[powerEl]||0);
        d.yong = (mySc > opSc) ? (((d.e[wealthEl]||0)>=(d.e[powerEl]||0))?wealthEl:powerEl) : (((d.e[motherEl]||0)>=(d.e[d.oh]||0))?motherEl:d.oh);
        if(!d.yong || d.e[d.yong]===0) d.yong = (mySc > opSc) ? childEl : motherEl;
        if(!d.yong) d.yong = '木'; 
        
        const tenGodsCount = {'비겁':0, '식상':0, '재성':0, '관성':0, '인성':0};
        d.domGod = '비겁'; let maxG = -1;
        const calcGod = (tEl) => { if(d.oh===tEl) return '비겁'; if(childEls[d.oh]===tEl) return '식상'; if(wealthEls[d.oh]===tEl) return '재성'; if(powerEls[d.oh]===tEl) return '관성'; if(motherEls[d.oh]===tEl) return '인성'; return '-'; };
        
        d.mapping = { yG:calcGod(getOh(d.ch[0])), yZ:calcGod(getOh(d.ch[1])), mG:calcGod(getOh(d.ch[2])), mZ:calcGod(getOh(d.ch[3])), dZ:calcGod(getOh(d.ch[5])), hG:calcGod(getOh(d.ch[6])), hZ:calcGod(getOh(d.ch[7])) };
        
        d.ch.forEach(c => { const g = calcGod(getOh(c)); if(g!=='-') { tenGodsCount[g]++; if(tenGodsCount[g]>maxG){ maxG=tenGodsCount[g]; d.domGod=g; } } });
        d.myGyukguk = d.mapping.mZ !== '-' ? d.mapping.mZ : d.domGod;

        // 5. 세운 합충 및 대운 스캔
        const sG = '丙', sZ = '午'; d.cYear = 2026;
        d.dyn = [];
        if(ganHab[d.dG]===sG) d.dyn.push(`올해 [${sG}] 기운이 당신의 일간[${d.dG}]과 천간합을 이뤄 긍정적인 융합이 예견됩니다.`);
        if(zhiChung[d.dZ]===sZ) d.dyn.push(`올해 [${sZ}] 기운이 당신의 일지[${d.dZ}]를 강하게 충격하여 환경 변화가 예상됩니다.`);

        let daewun = []; try{ const dyList=d.bazi.getYun(isMale?1:0).getDaYun(); for(let i=0;i<8;i++)if(dyList[i])daewun.push({age:dyList[i].getStartAge(), ganzhi:dyList[i].getGanZhi()}); }catch(e){}
        d.daewun = daewun;
        d.curDw = daewun.find(dw => d.age >= dw.age) || daewun[0] || {age:1, ganzhi:'甲子'};

        return d;
    }

    // --- 로딩 텍스트 애니메이션 함수 ---
    function animateLoader(type, callback) {
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        loader.style.display = 'flex';
        
        const texts = {
            saju: ["우주적 시공간 좌표를 추출 중입니다...", "사주 8글자 명식을 조립 중입니다...", "타고난 오행 밸런스 및 십성을 스캔합니다...", "운명을 살리는 조후/억부 용신 타겟팅 중...", "운명노트 작성이 거의 완료되었습니다."],
            gunghap: ["두 사람의 시공간 좌표를 동기화 중입니다...", "천간의 합과 지지의 충을 스캔 중입니다...", "상호 용신 보완율을 정밀 계산합니다...", "우주적 인연 궁합 리포트 작성 중..."],
            tojeong: ["태세(太歲) 및 일진(日辰) 작괘 중...", "운명 코드 도출 및 사언절구 해독 중...", "12개월 정밀 타임라인 구성 중..."]
        };
        
        let msgs = texts[type] || ["운명 해독 중..."];
        let msgIdx = 0;
        loaderText.innerText = msgs[0];
        
        const interval = setInterval(() => {
            msgIdx++;
            if(msgIdx < msgs.length) loaderText.innerText = msgs[msgIdx];
        }, 600);

        setTimeout(() => {
            clearInterval(interval);
            callback();
        }, msgs.length * 600 + 400);
    }

    function handleStart(type) {
        const name = document.getElementById('user-name').value;
        if(!name) return alert("성함을 입력해주세요.");
        
        animateLoader(type, () => {
            try {
                const isMale = document.getElementById('user-gender').value === 'male';
                const me = calculatePersonal(getBazi(parseInt(document.getElementById('user-year').value), parseInt(document.getElementById('user-month').value), parseInt(document.getElementById('user-day').value), document.getElementById('user-cal').value, document.getElementById('user-time').value), isMale);
                me.name = name;

                let h = "";
                if(type === 'gunghap') {
                    const pName = document.getElementById('partner-name').value;
                    if(!pName) { document.getElementById('loader').style.display='none'; return alert("상대방 이름을 입력해주세요."); }
                    const pIsMale = document.getElementById('p-gender').value === 'male';
                    const you = calculatePersonal(getBazi(parseInt(document.getElementById('p-year').value), parseInt(document.getElementById('p-month').value), parseInt(document.getElementById('p-day').value), document.getElementById('p-cal').value, document.getElementById('p-time').value), pIsMale);
                    you.name = pName;
                    h = renderGunghap(me, you);
                } else if(type === 'saju') {
                    h = renderSaju(me);
                } else if(type === 'tojeong') {
                    h = renderTojeong(me);
                }

                document.getElementById('report-content').innerHTML = h;
                document.getElementById('loader').style.display='none';
                document.getElementById('home-view').style.display='none';
                document.getElementById('result-view').style.display='block';
                setTimeout(() => { document.querySelectorAll('.fade-in-section').forEach(s => s.classList.add('is-visible')); }, 100);
                window.scrollTo(0,0);
            } catch(e) { 
                console.error(e); 
                alert("분석 중 오류가 발생했습니다.\n입력하신 정보를 확인해주세요."); 
                document.getElementById('loader').style.display='none'; 
            }
        });
    }
