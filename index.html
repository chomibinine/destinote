<!DOCTYPE html>
<html lang="ko">

    <title>운명노트(destinote) | 소름돋는 정통 명리·궁합</title>
    <!-- 명리학 라이브러리 및 캡처 도구 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #05070a; --bg-gradient: radial-gradient(circle at 50% 0%, #111724 0%, #05070a 100%); --card-glass: rgba(18, 22, 33, 0.6); --card-border: rgba(255, 255, 255, 0.08); --accent-gold: #d4af37; --accent-gold-light: #f9e596; --premium-gradient: linear-gradient(135deg, #f9e596 0%, #d4af37 100%); --text-main: #e2e8f0; --text-muted: #94a3b8; --color-wood: #4ade80; --color-fire: #fb923c; --color-earth: #fbbf24; --color-metal: #cbd5e1; --color-water: #60a5fa; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; word-break: keep-all; overflow-wrap: break-word; }
        body { background: var(--bg-base); color: var(--text-main); line-height: 1.8; overflow-x: hidden; min-height: 100vh; position: relative; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background: var(--bg-gradient); }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3; animation: float 20s infinite alternate ease-in-out; }
        .orb-1 { width: 450px; height: 450px; background: rgba(212,175,55,0.15); top: -100px; left: -150px; }
        .orb-2 { width: 550px; height: 550px; background: rgba(56,189,248,0.1); bottom: -200px; right: -150px; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,50px) scale(1.1); } }
        
        .app-container { max-width: 720px; margin: 0 auto; padding: 0 20px 160px; position: relative; z-index: 1; }

        .card { background: var(--card-glass); backdrop-filter: blur(25px); border: 1px solid var(--card-border); border-radius: 35px; padding: 40px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        input:focus, select:focus { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

        .detail-text { font-size: 1.05rem; line-height: 1.9; color: var(--text-main); text-align: justify; }

        .pillar-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; } 
        .pillar { background: rgba(255,255,255,0.03); padding: 25px 8px; border-radius: 20px; text-align: center; border: 1px solid var(--card-border); position: relative;} 
        .pillar b { font-size: 1.6rem; display: block; color: #fff; margin-bottom: 5px; transition: 0.3s;}
        .pillar span { font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 10px; font-weight:600; }
        .pillar .broken { color: #ff4757 !important; text-decoration: line-through; opacity: 0.6; }
        .pillar .amplified { color: #4ade80 !important; text-shadow: 0 0 10px rgba(74,222,128,0.5); }
        
        .element-chart-container { margin: 50px 0; padding: 35px; background: rgba(0,0,0,0.4); border-radius: 30px; border: 1px solid var(--card-border); }
        .bar-wrap { display: flex; align-items: center; margin-bottom: 18px; gap: 15px; }
        .bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 10px; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fill-wood { background: var(--color-wood); } .fill-fire { background: var(--color-fire); } .fill-earth { background: var(--color-earth); } .fill-metal { background: var(--color-metal); } .fill-water { background: var(--color-water); }
        
        .terminal-box { background: #0a0c10; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; font-family: 'Courier New', Courier, monospace; color: #10b981; font-size: 0.9rem; line-height: 1.6; margin-bottom: 50px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); overflow-x: hidden; word-break: break-all; }
        .log-sys { color: #60a5fa; } .log-err { color: #f87171; } .log-warn { color: #fbbf24; } .log-success { color: #a78bfa; font-weight: bold; }

        .timeline { position: relative; padding-left: 20px; border-left: 2px solid rgba(212,175,55,0.2); margin-top:30px; } 
        .timeline-item { position: relative; margin-bottom: 35px; padding-left: 25px; } 
        .timeline-point { position: absolute; left: -31px; top: 8px; width: 12px; height: 12px; background: var(--accent-gold); border-radius: 50%; box-shadow: 0 0 10px var(--accent-gold); } 
        
        .btn-rec { display: inline-flex; align-items: center; justify-content: center; gap: 12px; background: rgba(255,255,255,0.04); color: #fff; padding: 20px; border-radius: 18px; text-decoration: none; font-weight: 600; border: 1px solid var(--card-border); width: 100%; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-rec:hover { background: rgba(255,255,255,0.1); }
        .btn-coupang { background: linear-gradient(135deg, #FF0000 0%, #FF5A00 100%); color: #fff !important; border: none; box-shadow: 0 10px 25px rgba(255,0,0,0.3); font-size: 1.1rem; }

        #loader { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-base); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; } 
        .loader-ring { width: 70px; height: 70px; border: 3px solid transparent; border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite; } 
        @keyframes spin { to { transform: rotate(360deg); } }
        #custom-modal { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 71, 87, 0.95); color: #fff; padding: 15px 30px; border-radius: 12px; z-index: 100001; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; width: 90%; max-width: 400px; }
        .fade-in-section { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .fade-in-section.is-visible { opacity: 1; transform: none; }
        @media (max-width: 600px) { .pillar-row { grid-template-columns: repeat(2, 1fr); } .daewun-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>
<div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div id="loader"><div class="loader-ring"></div><p id="loader-text" style="color:var(--accent-gold); margin-top:25px; font-weight:700; letter-spacing:2px;">엔진 시스템 초기화 중...</p></div>
<div id="custom-modal"></div>

<div class="app-container" id="main-app" style="display:none;">
    <div id="home-view">
        <header class="header"><h1>운명노트</h1><p>The Oracle SaaS 19.0 (무료 사주)</p></header>
        <div id="input-area" class="card">
            <div class="form-group"><label>성함</label><input type="text" id="user-name" placeholder="이름 입력"></div>
            <div class="form-group"><label>생년월일</label><div class="select-row"><select id="user-year"></select><select id="user-month"></select><select id="user-day"></select></div></div>
            <div class="form-group select-row">
                <div style="flex:1;"><label>성별</label><select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select></div>
                <div style="flex:1;"><label>력</label><select id="user-cal"><option value="solar">양력</option><option value="lunar">음력</option></select></div>
            </div>
            <div class="form-group" style="margin-top:20px;"><label>태어난 시각</label>
                <select id="user-time">
                    <option value="none">모름 / 미정</option>
                    <option value="yaja">야자시 (23:30~)</option><option value="joja">조자시 (~01:29)</option>
                    <option value="2">축시 (01:30~)</option><option value="4">인시 (03:30~)</option><option value="6">묘시 (05:30~)</option>
                    <option value="8">진시 (07:30~)</option><option value="10">사시 (09:30~)</option><option value="12">오시 (11:30~)</option>
                    <option value="14">미시 (13:30~)</option><option value="16">신시 (15:30~)</option><option value="18">유시 (17:30~)</option>
                    <option value="20">술시 (19:30~)</option><option value="22">해시 (21:30~)</option>
                </select>
            </div>
        </div>

        <div id="partner-area" class="card" style="display:none; border-top: 2px solid var(--accent-gold);">
            <h4 style="color:var(--accent-gold-light); margin-bottom:20px; text-align:center;">❤️ 상대방 정보</h4>
            <div class="form-group"><label>상대 이름</label><input type="text" id="p-name" placeholder="상대방 이름"></div>
            <div class="form-group"><label>상대 생일</label><div class="select-row"><select id="p-year"></select><select id="p-month"></select><select id="p-day"></select></div></div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="App.start('saju')"><div class="menu-icon-wrap">🧭</div><h3>정밀 사주</h3><p>조후/격국 엔진</p></div>
            <div class="menu-item" onclick="App.toggleGunghap()"><div class="menu-icon-wrap" id="gun-icon">❤️</div><h3 id="gun-title">인연 궁합</h3><p>에너지 교차 분석</p></div>
        </div>
        <div id="visitor-ui" style="text-align:center; font-size:0.8rem; color:var(--text-muted);"></div>
    </div>

    <div id="result-view" style="display:none;">
        <div id="report-wrap" style="background:#05070a;"><div id="report-content"></div></div>
        <div style="display:flex; gap:10px; margin-top:30px;">
            <button class="btn-rec" style="flex:1;" onclick="App.downloadImage()">📸 캡처</button>
            <button class="btn-rec" style="flex:1;" onclick="App.shareReport()">🔗 복사</button>
        </div>
        <button class="btn-rec" onclick="App.goHome()" style="width:100%; margin-top:15px;">🏠 홈으로</button>
    </div>
</div>

<script type="module">
    import { Pipeline, CoreHelper } from './engine.js';

    // [Fix] Utils 정의 복구 (XSS 방어 및 유효성 검사)
    const Utils = {
        showModal: (msg) => { const m = document.getElementById('custom-modal'); m.innerText = msg; m.style.display = 'block'; setTimeout(()=>m.style.display='none',3000); },
        escape: (s) => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),
        isValid: (y,m,d) => { const dt = new Date(y, m-1, d); return dt.getFullYear()===y && dt.getMonth()===m-1 && dt.getDate()===d; }
    };

    // [Fix] Render 함수 누락 전면 복구
    const Render = {
        wrap: (c) => `<div class="fade-in-section">${c}</div>`,
        header: (d) => Render.wrap(`<div style="text-align:center; padding:20px; background:linear-gradient(135deg, rgba(212,175,55,0.1), transparent); border:1px solid var(--accent-gold); border-radius:24px; margin-bottom:50px;"><h2 style="font-size:2.2rem; color:var(--accent-gold-light); margin-bottom:10px;">${Utils.escape(d.name)} 님의 운명노트</h2><p style="color:var(--text-muted); font-size:1rem;">${d.solStr}</p></div>`),
        pillars: (d) => {
            const getHtml = (gan, zhi, idx) => {
                if(!gan) return `<div class="pillar"><span>시주</span><b>?</b><b>?</b></div>`;
                const isBroken = d.branchStates[idx] ? d.branchStates[idx].clashCount > 0 : false;
                return `<div class="pillar"><span>${['연주','월주','일주(나)','시주'][idx]}</span><b style="${idx===2?'color:var(--accent-gold-light);':''}">${gan}</b><b class="${isBroken?'broken':''}">${zhi}</b></div>`;
            };
            return Render.wrap(`<div class="pillar-row">${d.hStr==='none'?'<div class="pillar"><span>시주</span><b>?</b><b>?</b></div>':getHtml(d.ch[6], d.ch[7], 3)}${getHtml(d.ch[4], d.ch[5], 2)}${getHtml(d.ch[2], d.ch[3], 1)}${getHtml(d.ch[0], d.ch[1], 0)}</div>`);
        },
        chart: (d) => {
            let total = Object.values(d.scores).reduce((a,b)=>a+b, 0);
            let h = `<div class="element-chart-container">`;
            ['木','火','土','金','水'].forEach(el => {
                const colors = {'木':'wood','火':'fire','土':'earth','金':'metal','水':'water'};
                let perc = ((d.scores[el]/total)*100).toFixed(1);
                h += `<div class="bar-wrap"><div class="bar-label">${el}</div><div class="bar-bg"><div class="bar-fill fill-${colors[el]}" style="width:${perc}%"></div></div><div style="width:50px; text-align:right;">${perc}%</div></div>`;
            });
            return Render.wrap(h + `</div>`);
        },
        daewun: (d) => Render.wrap(`<div class="daewun-grid">${d.daewun.map(w => `<div class="daewun-col" style="${w.age===d.curDw.age?'border-color:var(--accent-gold); background:rgba(212,175,55,0.1);':''}"><div class="daewun-age">${w.age}세</div><div class="daewun-char">${w.ganzhi.charAt(0)}<br>${w.ganzhi.charAt(1)}</div></div>`).join('')}</div>`),
        logs: (d) => Render.wrap(`<div class="sec-title">우주적 이벤트 로그</div><div class="terminal-box">${d.logs.map(l=>`<div class="log-${l.level}">> ${l.msg}</div>`).join('')}</div>`),
        timeline: (d) => {
            let timeH = ''; const bA = MYSTIC_DATA.TIMELINE_DB.animals; const tA = MYSTIC_DATA.TIMELINE_DB.desc;
            for(let i=0; i<10; i++){ let yr=d.cYear+i; let idx=(yr-4)%12; timeH += `<div class="timeline-item"><div class="timeline-point"></div><div class="timeline-year">${yr}년 (${bA[idx]})</div><div class="detail-text">${tA[idx]}</div></div>`; }
            return Render.wrap(`<div class="sec-title">📈 향후 10년 운명 타임라인</div><div class="timeline">${timeH}</div>`);
        },
        analysis: (d) => {
            const gyukDesc = MYSTIC_DATA.GYUKGUK_DB[d.trueGyuk.replace('격','')]?.d || "비범한 그릇을 지녔습니다.";
            let h = Render.wrap(`<div class="sec-title">🏛️ 격국 (운명의 틀)</div><div class="detail-text"><p><b class="basis-text">${d.trueGyuk}: </b>${gyukDesc}</p></div>`);
            h += Render.wrap(`<div class="sec-title">🧭 수호 용신</div><div class="detail-text"><p><b class="basis-text">수호 기운 [${d.yong}]: </b>${MYSTIC_DATA.YONGSHIN_DB[d.yong]?.d || ""}</p></div>`);
            h += Render.wrap(`<div class="sec-title">🌱 인생의 흐름</div><div class="detail-text"><p><b>초년: </b>${MYSTIC_DATA.LIFETIME_DB.e[d.oh]}<br><br><b>중년: </b>${MYSTIC_DATA.LIFETIME_DB.m[d.oh]}</p></div>`);
            return h;
        },
        action: (yong) => {
            const items = {'木':{n:'마음챙김 에세이', i:'📖', c:'그린'}, '火':{n:'아로마 디퓨저', i:'🕯️', c:'레드'}, '土':{n:'도자기 다기세트', i:'🍵', c:'황색'}, '金':{n:'메탈 시계', i:'⌚', c:'실버'}, '水':{n:'가습기', i:'💧', c:'블랙'}};
            const target = items[yong] || items['土'];
            return Render.wrap(`<div class="card" style="text-align:center; border:2px solid var(--accent-gold); margin-top:50px;"><h2 style="margin-bottom:20px;">✨ 개운(開運) 처방전</h2><p>부족한 <b>[${yong}]</b> 기운을 채워줄 최상의 아이템입니다.</p><div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:15px; margin:20px 0;">행운 컬러: <b style="color:var(--accent-gold-light);">${target.c}</b></div><a href="https://www.coupang.com/np/search?q=${encodeURIComponent(target.n)}&utm_source=affiliate" target="_blank" class="btn-rec btn-coupang">🛒 ${target.i} [ ${target.n} ] 보러가기</a><p style="font-size:0.7rem; color:var(--text-muted); margin-top:15px;">* 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다.</p></div>`);
        }
    };

    const App = {
        start: async (type) => {
            const name = Utils.escape(document.getElementById('user-name').value.trim());
            if(!name) return Utils.showModal("이름을 입력하세요.");
            const y=parseInt(document.getElementById('user-year').value), m=parseInt(document.getElementById('user-month').value), d=parseInt(document.getElementById('user-day').value);
            if(!Utils.isValid(y,m,d)) return Utils.showModal("날짜가 잘못되었습니다.");

            document.getElementById('loader').style.display='flex';
            setTimeout(() => {
                const res = Pipeline.run(y,m,d,document.getElementById('user-time').value, document.getElementById('user-cal').value, document.getElementById('user-gender').value==='male');
                res.name = name;
                
                const h = Render.header(res) + Render.pillars(res) + Render.daewun(res) + Render.logs(res) + Render.chart(res) + Render.analysis(res) + Render.timeline(res) + Render.action(res.yong);
                
                document.getElementById('report-content').innerHTML = h;
                document.getElementById('loader').style.display='none'; document.getElementById('home-view').style.display='none'; document.getElementById('result-view').style.display='block';
                
                const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('is-visible'); obs.unobserve(e.target); }}));
                document.querySelectorAll('.fade-in-section').forEach(el => obs.observe(el));
                window.scrollTo(0,0);
            }, 1200);
        },
        toggleGunghap: () => {
            const area = document.getElementById('partner-area');
            const isVis = area.style.display === 'block';
            area.style.display = isVis ? 'none' : 'block';
            document.getElementById('gun-title').innerText = isVis ? "인연 궁합" : "궁합 분석";
            if(!isVis) area.scrollIntoView({behavior:'smooth'});
        },
        downloadImage: () => {
            const wrap = document.getElementById('report-wrap');
            const scale = window.innerWidth < 600 ? 1 : 2;
            html2canvas(wrap, { scale, backgroundColor:'#05070a' }).then(c => {
                let a=document.createElement('a'); a.download='운명노트.png'; a.href=c.toDataURL(); a.click();
            });
        },
        shareReport: () => {
            const t = document.createElement('textarea'); document.body.appendChild(t); t.value = window.location.href; t.select(); document.execCommand('copy'); document.body.removeChild(t);
            Utils.showModal("링크가 복사되었습니다.");
        },
        goHome: () => location.reload(),
        init: async () => {
            // [Fix] data.json 로드 에러 방어
            try { const r = await fetch('data.json'); window.MYSTIC_DATA = await r.json(); } catch(e) { window.MYSTIC_DATA = MYSTIC_DATA; }
            
            const ys=document.getElementById('user-year'), ms=document.getElementById('user-month'), ds=document.getElementById('user-day');
            for(let i=2025;i>=1930;i--) ys.add(new Option(i+'년', i));
            for(let i=1;i<=12;i++) ms.add(new Option(i+'월', i));
            for(let i=1;i<=31;i++) ds.add(new Option(i+'일', i));
            ys.value=1995;
            document.getElementById('loader').style.display='none';
        }
    };

    window.App = App;
