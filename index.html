<script>
    function animateLoader(type, callback) {
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        loader.style.display = 'flex';
        const msgs = { saju:["좌표 추출 중...", "월령 가중치 계산 중...", "통근 및 뿌리 강도 스캔 중...", "12운성 및 공망 탐지 중...", "운명노트 작성 완료."], gunghap:["에너지 동기화 중...", "천간합/지지충 스캔 중...", "상호 용신 보완율 분석 중...", "인연 리포트 완성 중..."] }[type] || ["운명 해독 중..."];
        let idx = 0; loaderText.innerText = msgs[0];
        const iv = setInterval(() => { idx++; if(idx < msgs.length) loaderText.innerText = msgs[idx]; }, 600);
        setTimeout(() => { clearInterval(iv); callback(); }, msgs.length * 600 + 400);
    }

    function toggleGunghap() {
        isGunghapMode = !isGunghapMode;
        document.getElementById('partner-input-area').style.display = isGunghapMode ? 'block' : 'none';
        document.getElementById('gun-title').innerText = isGunghapMode ? "궁합 분석하기" : "인연 궁합";
        if(isGunghapMode) document.getElementById('partner-input-area').scrollIntoView({behavior:'smooth'});
        else handleStart('gunghap');
    }

    function handleStart(type) {
        const name = document.getElementById('user-name').value;
        if(!name) return alert("성함을 입력해주세요.");
        animateLoader(type==='gunghap'?'gunghap':'saju', () => {
            try {
                const me = Engine2.run(parseInt(document.getElementById('user-year').value), parseInt(document.getElementById('user-month').value), parseInt(document.getElementById('user-day').value), document.getElementById('user-time').value, document.getElementById('user-cal').value, document.getElementById('user-gender').value==='male');
                me.name = name;
                let h = "";
                if(type === 'gunghap') {
                    const pName = document.getElementById('partner-name').value;
                    if(!pName) { document.getElementById('loader').style.display='none'; return alert("상대방 이름을 입력해주세요."); }
                    const you = Engine2.run(parseInt(document.getElementById('p-year').value), parseInt(document.getElementById('p-month').value), parseInt(document.getElementById('p-day').value), document.getElementById('p-time').value, document.getElementById('p-cal').value, document.getElementById('p-gender').value==='male');
                    you.name = pName;
                    h = renderGunghap(me, you);
                } else if(type === 'saju') h = renderSaju(me);
                else if(type === 'tojeong') h = renderTojeong(me);

                document.getElementById('report-content').innerHTML = h;
                document.getElementById('loader').style.display='none';
                document.getElementById('home-view').style.display='none';
                document.getElementById('result-view').style.display='block';
                setTimeout(() => { document.querySelectorAll('.fade-in-section').forEach(s => s.classList.add('is-visible')); }, 100);
            } catch(e) { console.error(e); alert("분석 오류!"); document.getElementById('loader').style.display='none'; }
        });
    }

    function renderSaju(d) {
        let h = `<div class="daily-fortune"><h3>오늘의 운명지수</h3><p>"모든 퍼즐이 맞춰지고 진짜 당신의 진면목이 드러나는 시기입니다."</p></div>
                 <div style="text-align:center; margin-bottom:50px;"><h2 style="font-size:2.2rem; color:var(--accent-gold-light);">${d.name} 님의 운명노트</h2><p style="color:var(--text-muted);">${d.solStr}</p></div>`;
        
        h += wrap(`<div class="sec-title">사주 명식표</div><div class="pillar-row">
            <div class="pillar"><span>시주</span><b>${d.ch[6]}</b><b>${d.ch[7]}</b></div>
            <div class="pillar" style="border-color:var(--accent-gold); box-shadow:inset 0 0 30px rgba(212,175,55,0.2);"><span>일주(나)</span><b>${d.ch[4]}</b><b>${d.ch[5]}</b></div>
            <div class="pillar"><span>월주</span><b>${d.ch[2]}</b><b>${d.ch[3]}</b></div>
            <div class="pillar"><span>연주</span><b>${d.ch[0]}</b><b>${d.ch[1]}</b></div></div>`);

        let chart = `<div class="element-chart-container">`;
        ['木','火','土','金','水'].forEach(el => {
            const colors = {'木':'wood','火':'fire','土':'earth','金':'metal','水':'water'};
            chart += `<div class="bar-wrap"><div class="bar-label" style="color:var(--color-${colors[el]})">${el}</div><div class="bar-bg"><div class="bar-fill fill-${colors[el]}" style="width:${(d.e[el]/14)*100}%"></div></div><div style="margin-left:10px; font-weight:700;">${d.e[el]}</div></div>`;
        });
        h += wrap(chart + `</div>`);

        let master = `<p style="margin-bottom:20px;"><b class="basis-text">십이운성 에너지:</b> 개인적 성향은 <b>[${d.w12_p}]</b>의 에너지를 띠고 있습니다. <br>${MYSTIC_DATA.WOUNSUNG_DB[d.w12_p]}</p>`;
        if(d.gm.pos.length > 0) master += `<p><b class="basis-text">공망(空亡) 스캔 (${d.gm.chars}):</b> 명식 중 <b>${d.gm.pos.join(', ')}</b>에 공망이 발견되었습니다. <br>${MYSTIC_DATA.GONGMANG_DB[d.gm.pos[0]]}</p>`;
        h += UI_Sec("🌌 2.0 정밀 심연 스캔", "12운성 및 공망 탐지 결과:", "", UI_Box("", master));

        h += UI_Sec("🧭 운명의 가이드", "나를 살리는 용신 분석:", MYSTIC_DATA.YONGSHIN_DB[d.yong].d);
        h += UI_Sec("🌱 인생의 흐름", "본원의 기질과 평생운:", `<br><b>나의 본질:</b> ${MYSTIC_DATA.JIGAN_DB[d.ch[4]].desc}<br><br><b>초년:</b> ${MYSTIC_DATA.LIFETIME_DB.e[d.oh]}<br><br><b>중년:</b> ${MYSTIC_DATA.LIFETIME_DB.m[d.oh]}<br><br><b>말년:</b> ${MYSTIC_DATA.LIFETIME_DB.l[d.oh]}`);
        
        return h + renderActionBox(d.oh);
    }

    function renderGunghap(me, you) {
        let score = 75;
        if(ganHab[me.dG] === you.dG) score += 20;
        if(me.yong === you.oh) score += 15;
        if(zhiChung[me.dZ] === you.dZ) score -= 25;
        const res = MYSTIC_DATA.GUNGHAP_DB[score>=85?'good':(score>=60?'normal':'bad')];
        let h = `<div class="daily-fortune"><h3>❤️ 궁합지수: ${score}점</h3><p>"${res.t}"</p></div><div style="display:flex; justify-content:center; gap:20px; margin-bottom:50px;"><div class="pillar" style="flex:1;"><span>${me.name}</span><b>${me.dG}</b><b>${me.dZ}</b></div><div style="font-size:2.5rem; align-self:center;">💖</div><div class="pillar" style="flex:1;"><span>${you.name}</span><b>${you.dG}</b><b>${you.dZ}</b></div></div>`;
        return h + UI_Box("👩‍❤️‍👨 우주적 인연의 결론", res.d) + renderActionBox(me.oh);
    }

    function renderTojeong(d) { return UI_Sec("📜 2026 신수", "전체 흐름:", MYSTIC_DATA.TOJEONG_DB.tA[1]) + renderActionBox(d.oh); }

    function renderActionBox(oh) {
        const seed = Math.floor(Math.random() * 9) + 1;
        const items = {'木':{n:'에세이',d:'동',c:'그린'}, '火':{n:'디퓨저',d:'남',c:'레드'}, '土':{n:'다기',d:'중앙',c:'황색'}, '金':{n:'메탈시계',d:'서',c:'실버'}, '水':{n:'가습기',d:'북',c:'블랙'}}[oh];
        return wrap(`<div class="action-box"><h2>✨ 운명을 바꾸는 처방</h2><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:30px 0;"><div class="card" style="margin:0; padding:15px;">컬러<br><b>${items.c}</b></div><div class="card" style="margin:0; padding:15px;">방위<br><b>${items.d}</b></div><div class="card" style="margin:0; padding:15px;">숫자<br><b>${seed}</b></div></div><a href="https://www.coupang.com/np/search?q=${encodeURIComponent(items.n)}" target="_blank" class="btn-rec">🛍️ 개운템 [ ${items.n} ] 찾기</a></div>`);
    }

    window.onload = async () => {
        const yS=document.getElementById('user-year'), py=document.getElementById('p-year');
        [yS, py].forEach(s => { for(let i=2025;i>=1930;i--) s.add(new Option(i+'년', i)); });
        [document.getElementById('user-month'), document.getElementById('p-month')].forEach(s => { for(let i=1;i<=12;i++) s.add(new Option(i+'월', i)); });
        [document.getElementById('user-day'), document.getElementById('p-day')].forEach(s => { for(let i=1;i<=31;i++) s.add(new Option(i+'일', i)); });
        
        try {
            const r = await fetch('data.json'); MYSTIC_DATA = await r.json();
            const tk='dn_total', dk='dn_today_'+new Date().toDateString();
            let total=parseInt(localStorage.getItem(tk)||2480)+1, today=parseInt(localStorage.getItem(dk)||12)+1;
            localStorage.setItem(tk, total); localStorage.setItem(dk, today);
            document.getElementById('visitor-ui').innerHTML = `🌟 오늘 <b>${today}</b>명 · 누적 <b>${total}</b>명이 운명을 기록했습니다.`;
            document.getElementById('loader').style.display='none'; document.getElementById('main-app').style.display='block';
        } catch(e) { document.getElementById('loader-text').innerText="DB 로딩 실패!"; }
    };
    function goHome() { location.reload(); }
    async function shareReport() { if(navigator.share) await navigator.share({title:'운명노트', url:window.location.href}); else alert('링크 복사됨!'); }
